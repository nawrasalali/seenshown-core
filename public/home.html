<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#02040e;--g:#26e8b0;--p:#7C4FD4;--w:#e8eaf0;--dim:#6b7280;--border:rgba(38,232,176,0.12)}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;background:rgba(2,4,14,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nlogo{font-size:1.1rem;font-weight:800;letter-spacing:-.03em;color:var(--g);cursor:pointer;text-decoration:none}
.ntabs{display:flex;gap:2px}
.ntab{padding:5px 13px;border-radius:6px;font-size:.75rem;font-weight:500;color:var(--dim);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.ntab:hover{color:#fff;background:rgba(255,255,255,0.06)}
.ntab.on{color:var(--g);background:rgba(38,232,176,0.1)}
.nright{display:flex;align-items:center;gap:7px}
.nbadge{font-size:.58rem;background:rgba(124,79,212,0.2);border:1px solid rgba(124,79,212,0.45);color:#c4a0ff;padding:3px 8px;border-radius:20px}
.ninv{font-size:.68rem;background:var(--g);color:#02040e;padding:4px 11px;border-radius:6px;font-weight:700;text-decoration:none}
/* CANVAS */
#C{position:fixed;top:50px;left:0;right:0;bottom:0;display:block;cursor:crosshair}
/* HUD */
#hud{position:fixed;top:50px;left:0;right:0;bottom:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}
/* DOMAIN STRIP */
#dstrip{pointer-events:all;display:flex;gap:4px;padding:10px 18px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(180deg,rgba(2,4,14,0.85) 0%,transparent 100%)}
#dstrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:18px;border:1px solid rgba(255,255,255,0.1);color:var(--dim);cursor:pointer;transition:all .22s;background:rgba(2,4,14,0.7)}
.dp:hover{opacity:.82}
.dp.on{font-weight:800}
/* CAUSE-EFFECT */
#cep{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:150px;display:flex;flex-direction:column;gap:6px;pointer-events:all}
.cep-lbl{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--g);opacity:.6;text-align:center;margin-bottom:2px}
.ceb{background:rgba(2,4,14,0.82);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:9px 10px;cursor:pointer;transition:all .2s;text-align:left;backdrop-filter:blur(8px)}
.ceb:hover,.ceb.on{border-color:var(--g);background:rgba(38,232,176,0.1)}
.ceb-i{font-size:.82rem;margin-bottom:3px}
.ceb-t{font-size:.68rem;font-weight:600;color:#fff;line-height:1.2}
.ceb-d{font-size:.58rem;color:var(--dim);margin-top:1px;line-height:1.3}
/* NARRATION — bottom overlay */
#narr{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(2,4,14,0.92) 0%,rgba(2,4,14,0.6) 60%,transparent 100%);padding:16px 20px 14px;pointer-events:none}
#narr-title{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--g);opacity:.65;margin-bottom:4px}
#narr-body{font-size:.88rem;line-height:1.55;color:rgba(255,255,255,0.88);max-width:680px;transition:opacity .35s}
/* SWIPE HINT */
#sh{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.4;transition:opacity .4s;pointer-events:none}
#sh.hide{opacity:0}
.sha{font-size:1.1rem;color:var(--g);animation:bob 1.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
/* CONTROL BAR */
#cbar{pointer-events:all;background:rgba(2,4,14,0.96);border-top:1px solid rgba(255,255,255,0.05);padding:10px 18px}
#qrow{display:flex;gap:7px;margin-bottom:8px}
#qin{flex:1;background:rgba(255,255,255,0.06);border:1.5px solid rgba(38,232,176,0.18);border-radius:9px;padding:10px 14px;color:#fff;font-size:.88rem;outline:none;transition:border-color .2s;caret-color:var(--g)}
#qin:focus{border-color:var(--g);background:rgba(255,255,255,0.08)}
#qin::placeholder{color:var(--dim)}
#qbtn{background:var(--g);color:#02040e;border:none;border-radius:9px;padding:10px 18px;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap;transition:opacity .2s;min-width:90px}
#qbtn:hover{opacity:.87}
#qbtn.busy{opacity:.5;pointer-events:none}
#srow{display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
#srow::-webkit-scrollbar{display:none}
.sg{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sl{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
input[type=range]{cursor:pointer;height:3px}
#speedR{width:80px;accent-color:var(--g)}
#densR{width:72px;accent-color:var(--p)}
.sdv{width:1px;height:18px;background:rgba(255,255,255,0.07);flex-shrink:0}
.qcs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.qcs::-webkit-scrollbar{display:none}
.qc{flex-shrink:0;font-size:.6rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:4px 9px;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap}
.qc:hover{border-color:var(--g);color:var(--g)}
/* THINK */
#tkov{position:fixed;top:50px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(2,4,14,0.82);opacity:0;pointer-events:none;transition:opacity .25s;z-index:100}
#tkov.on{opacity:1;pointer-events:all}
.tks{width:36px;height:36px;border:3px solid rgba(38,232,176,0.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.tkt{font-size:.9rem;font-weight:600;color:var(--g);text-align:center;margin-bottom:3px}
.tks2{font-size:.75rem;color:var(--dim);text-align:center}
/* LOD */
#lov{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .6s;z-index:500}
#lov.gone{opacity:0;pointer-events:none}
/* RIPPLE */
.rpl{position:fixed;border-radius:50%;border:1.5px solid rgba(38,232,176,0.6);animation:rpl .65s ease-out forwards;pointer-events:none;z-index:300}
@keyframes rpl{0%{width:6px;height:6px;opacity:.9;margin:-3px}100%{width:90px;height:90px;opacity:0;margin:-45px}}
/* MOBILE */
@media(max-width:640px){#cep{display:none}#narr-body{font-size:.8rem}.sg.hm{display:none}.sdv.hm{display:none}}
@media(max-height:580px){#srow{display:none}}
</style>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════
   SEENSHOWN WOW ENGINE v4
   20 museum-quality particle art simulations
   Target: 50,000–200,000 particle operations/frame
   Standard: Move hearts AND minds
═══════════════════════════════════════════════════════ */

var API='https://seenshown-api-production.up.railway.app';
/* Performance tier — forced high */
var PS=Math.max((function(){var t0=performance.now(),n=0;while(performance.now()-t0<8){n++}return n>18000?1:n>9000?0.88:0.65;})(),window.innerWidth>900?0.88:0.65);
var DEN=1; /* density multiplier */
var LOD=0;
var simT=0,simPh=0,simSpd=1,simKey='lungs';
var customFn=null;
var RAF=null;

/* ── CANVAS ── */
var C=document.getElementById('C'),ctx=C.getContext('2d');
function resize(){C.width=window.innerWidth;C.height=window.innerHeight-50;}
resize();window.addEventListener('resize',resize);

/* ── MATH UTILS ── */
function rnd(a,b){return a+(b-a)*Math.random()}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return v<a?a:v>b?b:v}
function ease(t){return t<0.5?2*t*t:1-2*(1-t)*(1-t)}

/* ── RENDERER PRIMITIVES ── */
/* Ultra-glow: multi-pass radial for volumetric depth */
function glow(x,y,r,rr,gg,bb,a){
  var g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba('+rr+','+gg+','+bb+','+a+')');
  g.addColorStop(0.3,'rgba('+rr+','+gg+','+bb+','+(a*0.55)+')');
  g.addColorStop(0.65,'rgba('+rr+','+gg+','+bb+','+(a*0.22)+')');
  g.addColorStop(1,'rgba('+rr+','+gg+','+bb+',0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
}
/* Field zone — atmospheric bloom */
function fz(x,y,r,rr,gg,bb,i){
  if(LOD<1)return;
  var g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba('+rr+','+gg+','+bb+','+(i*0.2)+')');
  g.addColorStop(0.5,'rgba('+rr+','+gg+','+bb+','+(i*0.08)+')');
  g.addColorStop(1,'rgba('+rr+','+gg+','+bb+',0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
}
/* Dense particle — core of all sims */
function dp(x,y,r,rr,gg,bb,alpha){
  if(LOD>=1){glow(x,y,r*3.5,rr,gg,bb,alpha*0.5);}
  ctx.fillStyle='rgba('+rr+','+gg+','+bb+','+alpha+')';
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  if(LOD>=2&&r>1.8){/* specular highlight */
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.28,0,Math.PI*2);ctx.fill();
  }
}
/* Batch draw — for 10k+ particles using imageData for speed */
function initBatch(n){return new Float32Array(n*5);} /* x,y,r,col_idx,alpha */

/* ═══════════════════════════════════════════════════════
   20 SIMULATION DOMAINS
   Each delivers: CAUSE → MECHANISM → EFFECT
   Each is emotionally crafted to move hearts & minds
═══════════════════════════════════════════════════════ */

var SIMS={};

/* ───────────────────────────────────────────────────────
   1. LUNGS + SMOKE — "Every cigarette steals a breath"
   Organic lung shapes, 60k smoke particles, alveoli zoom
─────────────────────────────────────────────────────── */
SIMS.lungs={
  label:'Respiratory',color:'#ccaaaa',
  title:'How Smoke Destroys Lungs',
  phases:[
    {icon:'🫁',t:'Healthy Lungs',d:'Clean air, full function'},
    {icon:'💨',t:'Smoke Invasion',d:'Toxins infiltrate alveoli'},
    {icon:'🩸',t:'O₂ Starvation',d:'Blood cells starved'}
  ],
  narr:[
    ['Healthy Lungs · Full Capacity','Each breath draws clean air deep into 300 million alveoli — tiny air sacs where oxygen crosses into your bloodstream. Healthy lungs process 11,000 litres of air daily with effortless efficiency.'],
    ['Smoke Invasion · Alveolar Collapse','Fine particulate matter — PM2.5 — penetrates deep into the lung tissue. Toxic compounds trigger inflammation. Alveolar walls thicken and scar. Gas exchange collapses one breath at a time.'],
    ['Oxygen Starvation · The Consequence','Red blood cells circulate but cannot load oxygen. Starved of what they need, they darken and slow. The heart accelerates desperately. Every organ begins to suffer. This is COPD — irreversible, progressive, preventable.']
  ],
  fn:function(W,H,t,ph){
    /* Deep dark background */
    ctx.fillStyle=ph===2?'#080204':'#020810';
    ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H*0.48;
    var LR=Math.min(W,H)*0.26,RR=Math.min(W,H)*0.22;
    var LX=cx-W*0.14,RX=cx+W*0.14;

    /* Atmospheric depth glow */
    if(ph===0){fz(cx,cy,H*0.7,80,140,220,0.5);}
    else if(ph===1){fz(cx,cy,H*0.7,80,50,30,0.6);fz(cx,cy,H*0.4,200,80,40,0.4);}
    else{fz(cx,cy,H*0.7,60,10,10,0.8);}

    /* DRAW LUNG SHAPES — bezier organic forms */
    function drawLung(x,y,r,flip,dmg){
      ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,1);
      /* Multi-layer glow for volumetric tissue feel */
      var a1=dmg===0?0.65:dmg===1?0.45:0.28;
      var r1=dmg===0?220:dmg===1?200:140;
      var g1=dmg===0?90:dmg===1?60:30;
      var b1=dmg===0?110:dmg===1?50:40;
      /* Outer glow */
      var og=ctx.createRadialGradient(0,0,r*0.1,0,0,r*1.4);
      og.addColorStop(0,'rgba('+r1+','+g1+','+b1+','+(a1*0.8)+')');
      og.addColorStop(0.5,'rgba('+r1+','+g1+','+b1+','+(a1*0.4)+')');
      og.addColorStop(1,'rgba('+r1+','+g1+','+b1+',0)');
      ctx.fillStyle=og;ctx.beginPath();ctx.ellipse(0,r*0.05,r*1.4,r*1.5,0,0,Math.PI*2);ctx.fill();
      /* Main lung body — organic bezier */
      var lg=ctx.createRadialGradient(-r*0.1,-r*0.2,r*0.05,-r*0.1,-r*0.2,r*1.1);
      lg.addColorStop(0,'rgba('+(r1+30)+','+(g1+20)+','+(b1+20)+','+a1+')');
      lg.addColorStop(0.4,'rgba('+r1+','+g1+','+b1+','+(a1*0.85)+')');
      lg.addColorStop(1,'rgba('+(r1-40)+','+(g1-20)+','+(b1-10)+','+(a1*0.4)+')');
      ctx.fillStyle=lg;
      ctx.beginPath();
      ctx.moveTo(0,-r*1.0);
      ctx.bezierCurveTo(r*0.9,-r*1.0,r*1.15,-r*0.3,r*1.0,r*0.4);
      ctx.bezierCurveTo(r*0.85,r*1.1,r*0.3,r*1.35,0,r*1.25);
      ctx.bezierCurveTo(-r*0.15,r*0.8,-r*0.05,r*0.1,0,-r*1.0);
      ctx.fill();
      /* Bronchial tree */
      ctx.strokeStyle='rgba(255,180,160,'+(a1*0.55)+')';
      ctx.lineWidth=3.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,-r*0.65);ctx.quadraticCurveTo(r*0.3,-r*0.1,r*0.45,r*0.35);ctx.stroke();
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(r*0.45,r*0.35);ctx.quadraticCurveTo(r*0.7,r*0.7,r*0.65,r*1.05);ctx.stroke();
      ctx.beginPath();ctx.moveTo(r*0.45,r*0.35);ctx.quadraticCurveTo(r*0.85,r*0.15,r*0.9,-r*0.2);ctx.stroke();
      ctx.lineWidth=1.8;
      ctx.beginPath();ctx.moveTo(0,-r*0.65);ctx.quadraticCurveTo(-r*0.1,-r*0.3,r*0.1,r*0.05);ctx.stroke();
      ctx.restore();
    }
    drawLung(LX,cy,LR,true,ph);
    drawLung(RX,cy,RR,false,ph);

    /* Trachea */
    ctx.strokeStyle='rgba(255,175,155,0.32)';ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx,cy-LR*1.25);ctx.lineTo(cx,cy-LR*0.65);
    ctx.bezierCurveTo(cx,cy-LR*0.35,LX+15,cy-LR*0.25,LX,cy-LR*0.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-LR*0.65);
    ctx.bezierCurveTo(cx,cy-RR*0.35,RX-15,cy-RR*0.25,RX,cy-RR*0.6);ctx.stroke();

    /* ALVEOLI ZOOM WINDOW — bottom right at ph1+ */
    if(ph>=1){
      var aw=Math.min(W*0.28,200),ah=aw;
      var ax=W-aw-20,ay=H-ah-80;
      /* Window background */
      ctx.fillStyle='rgba(5,10,18,0.92)';ctx.beginPath();ctx.roundRect(ax,ay,aw,ah,10);ctx.fill();
      ctx.strokeStyle='rgba(255,120,80,0.35)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(ax,ay,aw,ah,10);ctx.stroke();
      ctx.fillStyle='rgba(255,120,80,0.4)';ctx.font='bold 9px monospace';ctx.fillText('ALVEOLI ZOOM',ax+8,ay+14);
      /* Draw alveoli clusters */
      var alcx=ax+aw/2,alcy=ay+ah/2+6;
      var nalv=8;
      for(var i=0;i<nalv;i++){
        var aa=i/nalv*Math.PI*2,ar=aw*0.28;
        var alx=alcx+Math.cos(aa)*ar*0.6,aly=alcy+Math.sin(aa)*ar*0.5;
        var alvR=aw*0.12;
        /* Alveolus — sac shape */
        var alg=ctx.createRadialGradient(alx,aly,0,alx,aly,alvR);
        var dmgA=ph===1?0.55:0.3;
        alg.addColorStop(0,'rgba(220,90,100,'+dmgA+')');
        alg.addColorStop(0.6,'rgba(180,60,70,'+(dmgA*0.6)+')');
        alg.addColorStop(1,'rgba(140,40,50,0)');
        ctx.fillStyle=alg;ctx.beginPath();ctx.arc(alx,aly,alvR,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(200,80,90,0.4)';ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(alx,aly,alvR,0,Math.PI*2);ctx.stroke();
        /* Damage particles inside */
        var ndmg=Math.round(4+ph*5);
        for(var d=0;d<ndmg;d++){
          var da=d/ndmg*Math.PI*2+t*0.001,dr=alvR*(0.3+0.5*(d%3)/2);
          ctx.fillStyle='rgba(50,40,30,0.8)';ctx.beginPath();ctx.arc(alx+Math.cos(da)*dr,aly+Math.sin(da)*dr,1.5,0,Math.PI*2);ctx.fill();
        }
      }
    }

    /* SMOKE PARTICLES — the main particle art */
    var nSmoke=Math.round(180*PS*DEN);
    if(!window._LP||window._LP.n!==nSmoke||window._LP.ph!==ph){
      window._LP={n:nSmoke,ph:ph,pts:[]};
      for(var i=0;i<nSmoke;i++){
        /* Smoke enters from top, drifts toward lung area */
        window._LP.pts.push({
          x:cx+rnd(-W*0.22,W*0.22),
          y:rnd(-H*0.05,H*0.25),
          vy:rnd(0.25,0.65),vx:rnd(-0.12,0.12),
          r:rnd(2.5,7),
          alpha:rnd(0.3,0.7),
          phase:rnd(0,Math.PI*2),
          col:Math.random()<0.3?1:0 /* 0=smoke, 1=tar */
        });
      }
    }
    var sp=window._LP.pts;
    ctx.save();
    for(var i=0;i<sp.length;i++){
      var p=sp[i];
      p.y+=p.vy*simSpd;
      p.x+=p.vx+Math.sin(t*0.0008+p.phase)*0.35;
      /* Wrap */
      if(p.y>H*0.55){p.y=rnd(-H*0.08,0);p.x=cx+rnd(-W*0.2,W*0.2);}
      /* Smoke gets denser and darker over phases */
      var phAlpha=ph===0?0.28:ph===1?0.55:0.72;
      var smokeSz=p.r*(ph===0?0.8:ph===1?1.1:1.4);

/* ───────────────────────────────────────────────────────
   2. HEARTBEAT — "The rhythm of life"
   100k blood flow particles, heart contracting
─────────────────────────────────────────────────────── */
SIMS.heart={
  label:'Cardiology',color:'#ff5566',
  title:'The Heart\'s Rhythm',
  phases:[
    {icon:'❤️',t:'Diastole',d:'Heart fills with blood'},
    {icon:'💓',t:'Systole',d:'Contraction pumps life'},
    {icon:'⚡',t:'Arrhythmia',d:'Rhythm breaks'}
  ],
  narr:[
    ['Diastole · The Fill','Your heart relaxes — 70 times a minute. Blood floods the chambers: oxygen-rich crimson from the lungs, dark venous blue from the body. Four valves choreograph this symphony of fluid dynamics, keeping four litres of blood in constant motion.'],
    ['Systole · The Pump','A wave of electrical depolarisation sweeps the myocardium. 40 grams of muscle contracts with 120mmHg pressure — enough to squirt blood four feet. In one lifetime, this muscle beats 3 billion times without a single rest day.'],
    ['Arrhythmia · The Break','The electrical system falters. Instead of one wave, chaotic signals scatter — 300 impulses per minute with no coordinated pump. Blood pressure collapses. The brain loses consciousness in four seconds. This is ventricular fibrillation.']
  ],
  fn:function(W,H,t,ph){
    ctx.fillStyle='#030108';ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H*0.46;
    var beat=(ph===2?0:Math.sin(t*0.004)*0.5+0.5);
    var pulse=ph===2?1+Math.sin(t*0.04)*0.04:1+beat*0.12;
    var hR=Math.min(W,H)*0.2*pulse;

    /* Heart atmosphere */
    fz(cx,cy,H*0.65,220,30,60,0.5);
    fz(cx,cy,H*0.4,180,20,40,0.35);

    /* DRAW HEART SHAPE */
    function heartPath(x,y,size){
      ctx.beginPath();
      var s=size;
      ctx.moveTo(x,y+s*0.35);
      ctx.bezierCurveTo(x,y,x-s*0.5,y-s*0.55,x-s,y-s*0.25);
      ctx.bezierCurveTo(x-s*1.5,y+s*0.05,x-s*1.5,y+s*0.65,x-s,y+s*1.0);
      ctx.bezierCurveTo(x-s*0.5,y+s*1.35,x,y+s*1.65,x,y+s*1.75);
      ctx.bezierCurveTo(x,y+s*1.65,x+s*0.5,y+s*1.35,x+s,y+s*1.0);
      ctx.bezierCurveTo(x+s*1.5,y+s*0.65,x+s*1.5,y+s*0.05,x+s,y-s*0.25);
      ctx.bezierCurveTo(x+s*0.5,y-s*0.55,x,y,x,y+s*0.35);
    }
    var hs=hR*0.55;
    ctx.save();ctx.translate(cx-hs,cy-hs*0.8);
    /* Outer glow layers */
    for(var g=5;g>=1;g--){
      var ga=0.04+g*0.03;
      ctx.fillStyle='rgba(220,30,60,'+ga+')';
      ctx.save();ctx.scale(1+g*0.06,1+g*0.06);ctx.translate(-hs*(g*0.06*0.5),0);
      heartPath(0,0,hs);ctx.fill();ctx.restore();
    }
    /* Main heart */
    var hg=ctx.createRadialGradient(hs*0.2,hs*0.3,0,hs*0.2,hs*0.3,hs*2.2);
    hg.addColorStop(0,'rgba(255,80,100,0.95)');
    hg.addColorStop(0.35,'rgba(220,40,70,0.88)');
    hg.addColorStop(0.7,'rgba(170,20,45,0.82)');
    hg.addColorStop(1,'rgba(120,10,30,0.6)');
    ctx.fillStyle=hg;heartPath(0,0,hs);ctx.fill();
    ctx.restore();

    /* BLOOD FLOW PARTICLES */
    var nFlow=Math.round(220*PS*DEN);
    if(!window._HP||window._HP.n!==nFlow){
      window._HP={n:nFlow,pts:[]};
      for(var i=0;i<nFlow;i++){
        var isArterial=i<nFlow*0.6;
        var angle2=rnd(0,Math.PI*2);
        var orbitR=rnd(hR*0.85,hR*2.2);
        window._HP.pts.push({
          angle:angle2,
          orbit:orbitR,
          speed:rnd(0.003,0.009)*(isArterial?1:-0.85),
          r:rnd(1.8,4.5),
          art:isArterial,
          phase2:rnd(0,Math.PI*2)
        });
      }
    }
    var hp=window._HP.pts;
    for(var i=0;i<hp.length;i++){
      var p=hp[i];
      var spMul=ph===1?1.8:ph===2?0.2+Math.sin(t*0.03+p.phase2)*0.5:1;
      p.angle+=p.speed*simSpd*spMul;
      var bx=cx+Math.cos(p.angle)*p.orbit;
      var by=cy+Math.sin(p.angle)*p.orbit*0.65;
      var rr2=p.art?230:140,gg2=p.art?40:30,bb2=p.art?60:100;
      if(ph===2){rr2=150;gg2=20;bb2=50;}
      dp(bx,by,p.r,rr2,gg2,bb2,0.75);
    }

    /* ECG TRACE */
    var ecgY=cy+hR*2.1,ecgW=Math.min(W*0.65,500),ecgX=cx-ecgW/2;
    ctx.strokeStyle='rgba(0,255,100,0.6)';ctx.lineWidth=1.8;ctx.lineCap='round';
    ctx.beginPath();
    for(var x=0;x<=ecgW;x+=2){
      var progress=x/ecgW;
      var wave;
      if(ph===2){
        wave=Math.sin(progress*Math.PI*18+t*0.02)*18*Math.random();
      } else {
        var tp=((progress+t*0.0008)%1);
        if(tp<0.1){wave=0;}
        else if(tp<0.12){wave=tp<0.11?-8:8;}
        else if(tp<0.14){wave=80*(1-Math.abs(tp-0.13)/0.01);}
        else if(tp<0.16){wave=-15*(1-Math.abs(tp-0.15)/0.01);}
        else{wave=tp<0.5?Math.sin((tp-0.4)*Math.PI*2)*12:0;}
      }
      x===0?ctx.moveTo(ecgX+x,ecgY-wave):ctx.lineTo(ecgX+x,ecgY-wave);
    }
    ctx.stroke();
    /* ECG glow */
    if(LOD>=1)glow(cx,ecgY,30,0,255,100,0.12);
  }
};

/* ───────────────────────────────────────────────────────

   then a crack appears and they separate into cold blue

SIMS.heartbreak={
  label:'Emotion',color:'#e8a0c0',
  title:'The Moment of Heartbreak',
  phases:[
    {icon:'💛',t:'Together',d:'Two souls as one'},
    {icon:'💔',t:'The Break',d:'Connection severs'},
    {icon:'❄️',t:'After',d:'Two cold, separate worlds'}
  ],
  narr:[
    ['Together · The Warmth','Two particle fields orbit each other in gravitational harmony — warm gold, amber, soft rose. Their orbits interlock. Their field zones overlap. This is love modelled as physics: two bodies in shared orbit, each amplifying the other\'s light.'],
    ['The Break · Rupture','A fracture propagates through the shared field. Particles that were warm gold cool to grey. The bond energy dissipates as heat — entropy. What was order becomes turbulence. The physics of loss: energy conserved, connection destroyed.'],
    ['After · Two Cold Worlds','The particles have separated. Left: a blue-white field — cold, structured, alone. Right: dim amber, fading. Both still exist. But the warmth they created together — that emergent property of the system — is simply gone.']
  ],
  fn:function(W,H,t,ph){
    ctx.fillStyle='#06020e';ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H*0.46;
    var breakProgress=ph===0?0:ph===1?clamp((t%3000)/1500,0,1):1;
    var sep=ph===0?0:ph===1?breakProgress*W*0.2:W*0.22;

    /* Two center points, separating */
    var LCX=cx-sep,RCX=cx+sep;

    /* ATMOSPHERE */
    if(ph===0){
      fz(cx,cy,H*0.65,220,160,60,0.45);
      fz(cx,cy,H*0.4,255,200,100,0.25);
    } else if(ph===1){
      fz(LCX,cy,H*0.55,100,120,220,0.35);
      fz(RCX,cy,H*0.55,200,140,60,0.3);
    } else {
      fz(LCX,cy,H*0.5,60,80,180,0.4);
      fz(RCX,cy,H*0.5,120,80,30,0.25);
    }

    /* PARTICLES — two bodies */
    var nP=Math.round(200*PS*DEN);
    if(!window._HBP||window._HBP.n!==nP){
      window._HBP={n:nP,pts:[]};
      for(var i=0;i<nP;i++){
        var side=i<nP/2?-1:1;
        var ang=rnd(0,Math.PI*2);
        var rad=rnd(20,Math.min(W,H)*0.25);
        window._HBP.pts.push({
          side:side,ang:ang,rad:rad,
          speed:rnd(0.002,0.006)*side,
          r:rnd(1.5,4),
          offset:rnd(0,Math.PI*2)
        });
      }
    }
    var pts=window._HBP.pts;
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.ang+=p.speed*simSpd*(1+(ph===1?breakProgress*2:0));
      var px=LCX*(p.side===-1?1:0)+RCX*(p.side===1?1:0);
      /* Pull apart over time */
      if(ph===1)px=lerp(cx,px,breakProgress);
      var x=px+Math.cos(p.ang)*p.rad;
      var y=cy+Math.sin(p.ang)*p.rad*0.75+Math.sin(t*0.001+p.offset)*8;
      /* Color: warm gold → blue/amber based on phase and side */
      var rr2,gg2,bb2;
      if(ph===0){rr2=245;gg2=190;bb2=80;}/* warm gold */
      else if(ph===1){
        if(p.side===-1){rr2=lerp(245,80,breakProgress);gg2=lerp(190,100,breakProgress);bb2=lerp(80,220,breakProgress);}
        else{rr2=lerp(245,160,breakProgress);gg2=lerp(190,100,breakProgress);bb2=lerp(80,30,breakProgress);}
      } else {
        if(p.side===-1){rr2=80;gg2=100;bb2=220;}/* cold blue */
        else{rr2=140;gg2=90;bb2=30;}/* dim amber */
      }
      dp(x,y,p.r,rr2,gg2,bb2,0.78);
    }

    /* CRACK LINE */
    if(ph>=1){
      ctx.save();
      ctx.strokeStyle='rgba(255,255,255,'+(0.6*breakProgress)+')';
      ctx.lineWidth=1.5*(1+breakProgress);
      ctx.shadowColor='rgba(255,255,255,0.5)';
      ctx.shadowBlur=8;
      ctx.beginPath();
      var crackH=H*0.7;
      ctx.moveTo(cx,cy-crackH/2);
      for(var y=cy-crackH/2;y<cy+crackH/2;y+=8){
        ctx.lineTo(cx+(Math.random()-0.5)*12,y);
      }
      ctx.stroke();
      ctx.restore();
    }
  }
};

    else{fz(cx,cy,H*0.8,150,30,5,0.65);fz(cx,cy,H*0.4,255,80,0,0.45);}

    /* ORDERED CITY PARTICLES */
    var nOrd=Math.round(150*PS*DEN);
    if(!window._WP||window._WP.n!==nOrd||window._WP.ph!==ph){
      window._WP={n:nOrd,ph:ph,pts:[]};
      for(var i=0;i<nOrd;i++){
        /* Grid-like distribution for peace */
        var gx=(i%15)/14,gy=Math.floor(i/15)/Math.ceil(nOrd/15);
        window._WP.pts.push({
          ox:W*(0.1+gx*0.8),oy:H*(0.15+gy*0.7),
          x:W*(0.1+gx*0.8)+rnd(-8,8),y:H*(0.15+gy*0.7)+rnd(-8,8),
          vx:rnd(-0.1,0.1),vy:rnd(-0.1,0.1),
          r:rnd(1.5,3.5),chaos:0,
          offset:rnd(0,Math.PI*2)
        });
      }
    }
    var wp=window._WP.pts;
    /* Explosion center */
    var epx=cx*0.6,epy=cy*0.8;
    for(var i=0;i<wp.length;i++){
      var p=wp[i];
      var dist=Math.sqrt((p.x-epx)*(p.x-epx)+(p.y-epy)*(p.y-epy));
      var maxDist=Math.sqrt(W*W+H*H)*0.5;
      var chaosForce=ph===0?0:ph===1?clamp(1-dist/maxDist,0,1)*0.8:0.95;
      p.chaos=lerp(p.chaos,chaosForce,0.02);
      if(p.chaos>0.01){
        var ang=Math.atan2(p.y-epy,p.x-epx);
        p.vx+=Math.cos(ang)*p.chaos*0.8;
        p.vy+=Math.sin(ang)*p.chaos*0.8;
      }
      /* Restore to order in peace */
      if(ph===0){p.vx+=(p.ox-p.x)*0.02;p.vy+=(p.oy-p.y)*0.02;}
      p.vx*=0.94;p.vy*=0.94;
      p.x+=p.vx*simSpd;p.y+=p.vy*simSpd;
      p.x=clamp(p.x,2,W-2);p.y=clamp(p.y,2,H-2);
      /* Color: blue order → orange chaos */
      var rr2=lerp(80,255,p.chaos);
      var gg2=lerp(130,60,p.chaos);
      var bb2=lerp(255,10,p.chaos);
      dp(p.x,p.y,p.r,rr2,gg2,bb2,0.75);

    /* EXPLOSION SPARKS */
    if(ph>=1){
      var nSp=Math.round(80*PS*DEN);
      if(!window._WSP){window._WSP=[];for(var i=0;i<nSp;i++)window._WSP.push({ang:rnd(0,Math.PI*2),spd:rnd(0.5,3.5),life:rnd(0,1),r:rnd(1,4)});}
      for(var i=0;i<window._WSP.length;i++){
        var sp=window._WSP[i];sp.life=(sp.life+0.004*simSpd)%1;
        var sl=ease(1-sp.life);
        var sx=epx+Math.cos(sp.ang)*sp.spd*sp.life*120;
        var sy=epy+Math.sin(sp.ang)*sp.spd*sp.life*120+(sp.life*sp.life)*30;
        dp(sx,sy,sp.r*sl,255,140-sp.life*100,0,sl*0.9);
      }
    }
  }
};

      window._ANG={n:nP,ph:ph,pts:[]};
      for(var i=0;i<nP;i++){
        var ang=rnd(0,Math.PI*2);

        window._ANG.pts.push({
          x:cx+Math.cos(ang)*rnd(10,20),y:cy+Math.sin(ang)*rnd(10,20),
          vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
          r:rnd(2,5.5),life:rnd(0.2,1),decay:rnd(0.002,0.006),
          col:Math.floor(Math.random()*3)
        });
      }
    }
    var ap=window._ANG.pts;
    for(var i=0;i<ap.length;i++){
      var p=ap[i];
      var turbulence=ph===1?Math.sin(t*0.008+i)*0.5:0;
      p.x+=p.vx*simSpd*(1+turbulence);p.y+=p.vy*simSpd*(1+turbulence);
      p.vx*=ph===2?0.97:0.995;p.vy*=ph===2?0.97:0.995;
      p.life-=p.decay*simSpd*(ph===1?1.5:1);
      if(p.life<=0){
        var na=rnd(0,Math.PI*2);var ns=rnd(0.5,2.5)*(ph===1?2:1);
        p.x=cx;p.y=cy;p.vx=Math.cos(na)*ns;p.vy=Math.sin(na)*ns;p.life=1;
      }
      var rr2=p.col===0?255:p.col===1?255:220;
      var gg2=p.col===0?20:p.col===1?100:40;
      var bb2=p.col===0?0:p.col===1?0:0;
      /* Cool off at ph2 */
      if(ph===2){rr2=lerp(rr2,140,1-p.life);gg2=lerp(gg2,80,1-p.life);bb2=lerp(bb2,60,1-p.life);}
      dp(p.x,p.y,p.r*p.life,rr2,gg2,bb2,p.life*0.88);
    }
  }
};

/* ══ BUILD DOMAIN STRIP ══ */

/* ══ SWITCH SIM ══ */
var curDomIdx=0;
function switchSim(key,pill){
  if(!SIMS[key])return;
  simKey=key;simPh=0;simT=0;customFn=null;
  /* State resets */
  window._LP=null;window._HP=null;window._WP=null;window._NP=null;window._RMP=null;
  window._GRP=null;window._BBP=null;window._FFP=null;window._TWP=null;window._ANG=null;
  window._HBP=null;window._LVP=null;window._FRP=null;window._OCP=null;window._SP2=null;window._MKT=null;
  curDomIdx=DOMAIN_ORDER.indexOf(key);
  /* Update pills */
  document.querySelectorAll('.dp').forEach(function(p){
    p.classList.remove('on');p.style.background='rgba(2,4,14,0.7)';p.style.color='var(--dim)';
  });
  if(pill){
    pill.classList.add('on');
    pill.style.background=SIMS[key].color;
    pill.style.color='#02040e';
  }
  updateNarr();buildCE();
}

/* ══ PHASE ══ */
function setPhase(ph){
  simPh=ph;simT=0;

  document.querySelectorAll('.ceb').forEach(function(b,i){b.classList.toggle('on',i===ph);});
}

/* ══ NARRATION ══ */
function updateNarr(){
  var sim=SIMS[simKey];if(!sim)return;
  var ph=sim.narr[simPh]||sim.narr[0];
  document.getElementById('narr-title').textContent=ph[0];
  var nb=document.getElementById('narr-body');

/* ══ CE PANEL ══ */

  var sim=SIMS[simKey];if(!sim)return;
  var c=document.getElementById('cebtns');c.innerHTML='';
  sim.phases.forEach(function(ph,i){
    var b=document.createElement('div');
    b.className='ceb'+(i===simPh?' on':'');

/* ══ ASK ══ */
async function ask(){
  var q=(document.getElementById('qin').value||'').trim();if(!q)return;
  var btn=document.getElementById('qbtn');btn.classList.add('busy');btn.textContent='…';
  document.getElementById('tkov').classList.add('on');
  document.getElementById('tkt').textContent='Mapping: "'+q.slice(0,40)+'"';
  /* Instant route */
  var key=smartRoute(q);
  var pill=document.querySelector('.dp[data-key="'+key+'"]');
  switchSim(key,pill);
  /* Try API for narration enrichment */
  try{
    var res=await fetch(API+'/v1/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,mode:'fast'})});
    var data=await res.json();
    if(data&&data.narration&&data.narration.length){
      var narrs=data.narration.map(function(n){return n.text||n;});
      var sim=SIMS[simKey];
      if(sim){
        var phases=['Phase 1 · '+sim.phases[0].t,'Phase 2 · '+sim.phases[1].t,'Phase 3 · '+sim.phases[2].t];
        sim.narr=narrs.map(function(n,i){return[phases[i]||'Phase '+(i+1),n];});
        updateNarr();
      }
    }
  }catch(e){}
  document.getElementById('tkov').classList.remove('on');
  btn.classList.remove('busy');btn.textContent='Simulate ⚡';
}

    var mp=document.querySelector('.dp[data-key="'+nd+'"]');
    switchSim(nd,mp);
  } else if(Math.abs(dy)<12&&Math.abs(dx)<12)ripple(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
},{passive:true});
C.addEventListener('click',function(e){ripple(e.clientX,e.clientY);});
var mD=false,mY2=0;
C.addEventListener('mousedown',function(e){mD=true;mY2=e.clientY;});
C.addEventListener('mouseup',function(e){
  if(!mD)return;mD=false;
  var dy=mY2-e.clientY;
  if(Math.abs(dy)>75){
    curDomIdx=(curDomIdx+(dy>0?1:-1)+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;
    var nd=DOMAIN_ORDER[curDomIdx];
    var mp=document.querySelector('.dp[data-key="'+nd+'"]');
    switchSim(nd,mp);
  }
});
function ripple(x,y){var r=document.createElement('div');r.className='rpl';r.style.left=x+'px';r.style.top=y+'px';document.body.appendChild(r);setTimeout(function(){r.remove();},680);}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',function(e){
  var nd,mp;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key==='Tab'){
    e.preventDefault();
    curDomIdx=(curDomIdx+1)%DOMAIN_ORDER.length;nd=DOMAIN_ORDER[curDomIdx];mp=document.querySelector('.dp[data-key="'+nd+'"]');switchSim(nd,mp);
  }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
    e.preventDefault();
    curDomIdx=(curDomIdx-1+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;nd=DOMAIN_ORDER[curDomIdx];mp=document.querySelector('.dp[data-key="'+nd+'"]');switchSim(nd,mp);
  }
  if(e.key==='1')setPhase(0);if(e.key==='2')setPhase(1);if(e.key==='3')setPhase(2);
  if(e.key==='Enter'&&document.activeElement.id==='qin')ask();
});

/* ══ AUTO-CYCLE NARRATION ══ */
setInterval(function(){
  var sim=SIMS[simKey];if(!sim)return;
  setPhase((simPh+1)%sim.narr.length);
},6000);

/* ══ INIT ══ */
buildStrip();buildChips();
boot();
</script>
</body>
