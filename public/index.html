<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SeenShown — Watch Any Question Come Alive</title>
<meta name="description" content="Type any question. Watch it form in real-time particles.">
<meta name="theme-color" content="#02040e">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#02040e;--g:#26e8b0;--p:#7C4FD4;--w:#e8eaf0;--dim:#6b7280;--border:rgba(38,232,176,0.15);--red:#e05c5c;--gold:#f0c040}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--w);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#simCanvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:48px;background:rgba(2,4,14,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-logo{font-size:1.05rem;font-weight:800;color:var(--g);text-decoration:none}
.nav-tabs{display:flex;gap:1px}
.ntab{padding:4px 10px;border-radius:6px;font-size:.72rem;color:var(--dim);cursor:pointer;border:none;background:transparent;text-decoration:none;display:inline-block;transition:color .18s}
.ntab.active{color:var(--g);background:rgba(38,232,176,0.08)}
.nav-right{display:flex;align-items:center;gap:6px}
.nbadge{font-size:.55rem;background:rgba(124,79,212,0.18);border:1px solid rgba(124,79,212,0.4);color:#c4a0ff;padding:2px 6px;border-radius:12px}
.inv-btn{font-size:.65rem;background:var(--g);color:#02040e;padding:4px 9px;border-radius:6px;font-weight:700;text-decoration:none;display:inline-block}

/* PILLS */
#pills{position:fixed;top:48px;left:0;right:64px;z-index:100;display:flex;gap:4px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(180deg,rgba(2,4,14,0.9) 0%,transparent 100%)}
#pills::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:14px;border:1px solid rgba(255,255,255,0.09);color:var(--dim);cursor:pointer;transition:all .2s;background:rgba(2,4,14,0.7);white-space:nowrap}
.dpill.active{color:#02040e;font-weight:700}

/* RIGHT RAIL — fixed width 64px, stays out of text */
#rightRail{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:150;display:flex;flex-direction:column;align-items:center;gap:18px;padding:14px 8px;width:64px}
.rail-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform .2s}
.rail-btn:hover{transform:scale(1.08)}
.rail-icon{width:42px;height:42px;border-radius:50%;background:rgba(2,4,14,0.8);border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.1rem;backdrop-filter:blur(10px);transition:border-color .2s}
.rail-btn.liked .rail-icon{border-color:var(--red);background:rgba(224,92,92,0.15)}
.rail-label{font-size:.54rem;color:var(--dim);font-weight:600;text-align:center;line-height:1.2}
.rail-label.red{color:var(--red)}
.rail-label.gold{color:var(--gold)}
.rail-label.green{color:var(--g)}
@keyframes popUp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)translateY(-6px)}}
.popped{animation:popUp .3s ease}

/* BOTTOM PANEL — right margin = rail width so text never overlaps */
#bottomPanel{position:fixed;bottom:0;left:0;right:64px;z-index:150;pointer-events:none}
#answerWrap{pointer-events:all;padding:0 16px 8px;background:linear-gradient(0deg,rgba(2,4,14,0.98) 0%,rgba(2,4,14,0.75) 65%,transparent 100%)}
#narrPhase{font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:var(--g);opacity:.75;margin-bottom:5px;display:flex;align-items:center;gap:8px}
#phaseProgress{flex:1;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;max-width:120px}
#phaseProgressFill{height:100%;background:var(--g);border-radius:1px;transition:width .5s linear}
#narrDots{display:flex;gap:5px;margin-bottom:8px}
.ndot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.14);cursor:pointer;transition:all .2s}
.ndot.on{background:var(--g);width:16px;border-radius:3px}
#answerText{font-size:.9rem;line-height:1.7;color:rgba(255,255,255,0.9);min-height:42px;letter-spacing:.01em;max-width:560px}
.word{display:inline;opacity:0;transition:opacity .15s}
.word.show{opacity:1}

/* CONTROLS */
#iconRow{pointer-events:all;display:flex;align-items:center;gap:6px;padding:7px 14px 0;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
#iconRow::-webkit-scrollbar{display:none}
.ictl{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:4px 9px;font-size:.68rem;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .18s;white-space:nowrap;flex-shrink:0}
.ictl:hover{border-color:rgba(38,232,176,0.4);color:var(--g)}
.ictl.on{border-color:var(--g);color:var(--g);background:rgba(38,232,176,0.07)}
.sdiv{width:1px;height:14px;background:rgba(255,255,255,0.07);flex-shrink:0}
#speedR{width:64px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.chips{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0}
.chips::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;font-size:.58rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:3px 8px;color:var(--dim);cursor:pointer;transition:all .17s;white-space:nowrap}
.qchip:hover{border-color:var(--g);color:var(--g)}

/* INPUT */
#qRow{pointer-events:all;display:flex;gap:8px;padding:8px 14px 14px;background:rgba(2,4,14,0.98);border-top:1px solid rgba(255,255,255,0.06)}
#mainQ{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--w);font-size:.92rem;outline:none;transition:border-color .2s;caret-color:var(--g);resize:none;min-height:44px;max-height:86px;font-family:inherit;line-height:1.4}
#mainQ:focus{border-color:var(--g);background:rgba(255,255,255,0.09)}
#mainQ::placeholder{color:var(--dim)}
#askBtn{background:var(--g);color:#02040e;border:none;border-radius:12px;padding:11px 14px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;min-width:78px;transition:opacity .2s;align-self:flex-end}
#askBtn.busy{opacity:.45;pointer-events:none}

/* VOICE */
#voiceBadge{position:fixed;top:56px;left:14px;background:rgba(124,79,212,0.12);border:1px solid rgba(124,79,212,0.3);border-radius:8px;padding:4px 10px;font-size:.64rem;color:#c4a0ff;opacity:0;transition:opacity .3s;z-index:160;display:flex;align-items:center;gap:5px;pointer-events:none}
#voiceBadge.show{opacity:1}
.vwave{display:flex;gap:2px;align-items:center;height:12px}
.vwave span{display:block;width:2px;background:#c4a0ff;border-radius:2px;animation:vw .6s ease-in-out infinite}
.vwave span:nth-child(1){height:3px}
.vwave span:nth-child(2){animation-delay:.15s;height:9px}
.vwave span:nth-child(3){animation-delay:.3s;height:6px}
.vwave span:nth-child(4){animation-delay:.15s;height:11px}
.vwave span:nth-child(5){height:3px}
@keyframes vw{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

/* PHASE LABEL FLASH */
#phaseFlash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(1.2rem,4vw,2.2rem);font-weight:900;color:rgba(255,255,255,0.9);text-align:center;pointer-events:none;opacity:0;transition:opacity .4s;z-index:90;text-shadow:0 0 40px rgba(38,232,176,0.6);letter-spacing:.04em}
#phaseFlash.show{opacity:1}

/* POINTS TOAST */
#ptToast{position:fixed;top:28%;left:50%;transform:translateX(-50%);background:rgba(240,192,64,0.18);border:1px solid rgba(240,192,64,0.5);border-radius:20px;padding:8px 18px;font-size:.78rem;font-weight:700;color:var(--gold);opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;backdrop-filter:blur(8px)}
#ptToast.show{opacity:1}

/* SWIPE HINT */
#swipeHint{position:fixed;right:70px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;opacity:.3;transition:opacity .5s;z-index:50}
#swipeHint.hide{opacity:0}
@keyframes bup{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* COMPETE */
#compMode{position:fixed;inset:0;z-index:170;display:none;flex-direction:column}
#compMode.active{display:flex}
#compCanvas1,#compCanvas2{flex:1;display:block;width:100%}
#compDivider{height:3px;background:linear-gradient(90deg,var(--p),var(--g));position:relative;flex-shrink:0}
#compDivider::after{content:'VS';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);padding:2px 10px;border:1px solid var(--border);border-radius:8px;font-size:.62rem;font-weight:800;color:var(--g)}
#compVoteTop{position:fixed;bottom:50%;margin-bottom:8px;left:0;right:0;z-index:175;display:flex;padding:0 20px;pointer-events:all}
#compVoteBot{position:fixed;top:50%;margin-top:8px;left:0;right:0;z-index:175;display:flex;padding:0 20px;pointer-events:all}
.comp-vote-btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:700;font-size:.84rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(12px)}
#voteA{background:rgba(124,79,212,0.22);color:#c4a0ff;border:1px solid rgba(124,79,212,0.35)}
#voteB{background:rgba(38,232,176,0.12);color:var(--g);border:1px solid rgba(38,232,176,0.28)}
#compScores{position:fixed;top:55px;left:0;right:0;z-index:175;display:flex;justify-content:space-between;padding:6px 16px;font-size:.7rem;font-weight:700}
#scoreA{color:#c4a0ff}
#scoreB{color:var(--g)}
#compTimer{position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:175;background:rgba(2,4,14,0.88);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.72rem;color:var(--w);font-weight:700}
#closeComp{position:fixed;top:55px;right:14px;z-index:176;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 10px;font-size:.7rem;color:var(--dim);cursor:pointer}

/* LOAD */
#lodOv{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .5s;z-index:300}
#lodOv.gone{opacity:0;pointer-events:none}
.lring{width:36px;height:36px;border:2px solid rgba(38,232,176,0.12);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
.ltxt{font-size:.68rem;color:var(--dim)}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .ntab:not(.active){display:none}
  #rightRail{gap:14px;padding:10px 6px;width:56px}
  .rail-icon{width:38px;height:38px;font-size:1rem}
  #answerText{font-size:.82rem}
  #bottomPanel{right:56px}
}
</style>
</head>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   SEENSHOWN v6 — FORMATION ENGINE
   
   Architecture: Dr. Sina + Leo + Vera
   
   Every simulation starts from NOTHING.
   Particles are BORN and TRAVEL to target shapes.
   The answer FORMS in front of the viewer.
   
   Shapes: point, explosion, face(emoji), spiral,
           fracture, void_ring, scatter, wave, orbit,
           galaxy, neural, crystal, heartbeat
   
   5 phases per domain. Each phase = new shape target.
   Particles move from current → new target.
   
   The Big Bang: 1 particle → explosion → galaxy
   Heartbreak: two faces form → crack appears → separate cold fields
   Grief: face forms → face dissolves from centre → face reforms
═══════════════════════════════════════════════════════ */

var SB_URL='https://jnvdpmmxlbkxwanqqhfw.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudmRwbW14bGJreHdhbnFxaGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Nzc2MzgsImV4cCI6MjA5MTA1MzYzOH0.QBD3_YiDvJXvO12gE6FR1GthUd1SvC0MmOmVoPaU71M';
var ELEVEN_KEY='sk_a0c7de82c7a1a0e85ca0e62d5f69e7c5fcf3d0e1ac84fba8';
var ELEVEN_VOICE='JBFqnCBsd6RMkjVDRZzb';

var canvas=document.getElementById('simCanvas');
var ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',function(){resize();resetFormation();});

var W=function(){return canvas.width;};
var H=function(){return canvas.height;};
function cx(){return W()/2;}
function cy(){return H()/2;}

/* ═══ UTILS ═══ */
function rnd(a,b){return a+(b-a)*Math.random();}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}

/* ═══ STATE ═══ */
var simDomain='bigbang';
var simPhase=0;
var simSpeed=1;
var paused=false;
var voiceOn=true;
var voiceAudio=null;
var currentLikes=0;
var currentVotes=0;
var userPoints=0;
var currentSimId=null;
var wordStreamTimer=null;
var phaseAutoTimer=null;
var compActive=false;
var compTimer=null;
var compScoreA=0;
var compScoreB=0;
var compDraw1='bigbang';
var compDraw2='heartbreak';

/* ═══ PARTICLE POOL ═══ */
var MAX_P=80000; // 80K default, scales up on fast devices
var particles=[];
var pCount=0;
var formationT=0; // time within current phase
var PHASE_DUR=8000; // ms per phase auto-advance

/* Particle structure: x,y (current), tx,ty (target), bx,by (birth), r,rr,gg,bb,alpha, age, maxAge, formed */
function makeParticle(bx,by,tx,ty,r,rr,gg,bb){
  return {x:bx,y:by,tx:tx,ty:ty,bx:bx,by:by,r:r,rr:rr,gg:gg,bb:bb,alpha:0,age:0,delay:Math.random()*3000,formed:false,nx:0,ny:0};
}

/* ═══ SHAPE GENERATORS — return array of {tx,ty,rr,gg,bb,r} ═══ */

function shapePoint(n,x,y){
  var out=[];
  for(var i=0;i<n;i++)out.push({tx:x+rnd(-4,4),ty:y+rnd(-4,4),rr:255,gg:255,bb:255,r:rnd(.5,1.5)});
  return out;
}

function shapeExplosion(n,ox,oy,minR,maxR,rr,gg,bb){
  var out=[];
  for(var i=0;i<n;i++){
    var a=rnd(0,Math.PI*2);
    var d=Math.pow(Math.random(),.5)*(maxR-minR)+minR;
    /* Colour gradient — hot at centre, cool at edge */
    var heat=1-d/maxR;
    var pr=Math.round(rr+heat*(255-rr));
    var pg=Math.round(gg*heat);
    var pb=Math.round(bb*heat);
    out.push({tx:ox+Math.cos(a)*d,ty:oy+Math.sin(a)*d,rr:clamp(pr,0,255),gg:clamp(pg,0,255),bb:clamp(pb,0,255),r:rnd(.4,2.2+heat*2)});
  }
  return out;
}

function shapeSpiral(n,ox,oy,maxR,arms,rr,gg,bb){
  var out=[];
  for(var i=0;i<n;i++){
    var arm=i%arms;
    var t=Math.pow(Math.random(),0.6);
    var d=t*maxR;
    var baseA=arm/arms*Math.PI*2;
    var a=baseA+d*0.018+rnd(-.4,.4);
    var grad=t;
    out.push({
      tx:ox+Math.cos(a)*d,
      ty:oy+Math.sin(a)*d*.52,
      rr:Math.round(lerp(255,rr,grad)),
      gg:Math.round(lerp(240,gg,grad)),
      bb:Math.round(lerp(200,bb,grad)),
      r:rnd(.4,2.2-t)
    });
  }
  return out;
}

function shapeFace(n,emoji,ox,oy,size){
  /* Render emoji to offscreen canvas, extract lit pixels as targets */
  var off=document.createElement('canvas');
  var sz=Math.min(size,320);
  off.width=sz;off.height=sz;
  var octx=off.getContext('2d');
  octx.fillStyle='#000';
  octx.fillRect(0,0,sz,sz);
  octx.font='bold '+(sz*.82)+'px serif';
  octx.textAlign='center';
  octx.textBaseline='middle';
  octx.fillText(emoji,sz/2,sz/2);
  var imgData=octx.getImageData(0,0,sz,sz).data;
  var lit=[];
  for(var p=0;p<imgData.length;p+=4){
    if(imgData[p]>30||imgData[p+1]>30||imgData[p+2]>30){
      var px=(p/4)%sz;
      var py=Math.floor((p/4)/sz);
      lit.push({px:px/sz-.5,py:py/sz-.5,rr:imgData[p]||200,gg:imgData[p+1]||180,bb:imgData[p+2]||160});
    }
  }
  if(!lit.length)return shapeExplosion(n,ox,oy,20,size*.5,255,200,100);
  var out=[];
  for(var i=0;i<n;i++){
    var src=lit[Math.floor(Math.random()*lit.length)];
    out.push({
      tx:ox+src.px*size+rnd(-2,2),
      ty:oy+src.py*size+rnd(-2,2),
      rr:src.rr,gg:src.gg,bb:src.bb,
      r:rnd(.5,1.8)
    });
  }
  return out;
}

function shapeTwoFaces(n,emoji1,emoji2,ox,oy,size){
  var half=Math.floor(n/2);
  var left=shapeFace(half,emoji1,ox-size*.55,oy,size*.9);
  var right=shapeFace(n-half,emoji2,ox+size*.55,oy,size*.9);
  return left.concat(right);
}

function shapeRing(n,ox,oy,r,thickness,rr,gg,bb){
  var out=[];
  for(var i=0;i<n;i++){
    var a=rnd(0,Math.PI*2);
    var d=r+rnd(-thickness,thickness);
    out.push({tx:ox+Math.cos(a)*d,ty:oy+Math.sin(a)*d*.7,rr:rr,gg:gg,bb:bb,r:rnd(.5,1.8)});
  }
  return out;
}

function shapeVoidRing(n,ox,oy,innerR,outerR,rr,gg,bb){
  var out=[];
  for(var i=0;i<n;i++){
    var a=rnd(0,Math.PI*2);
    var d=innerR+Math.random()*(outerR-innerR);
    out.push({tx:ox+Math.cos(a)*d,ty:oy+Math.sin(a)*d*.75,rr:rr,gg:gg,bb:bb,r:rnd(.4,1.6)});
  }
  return out;
}

function shapeFracture(n,ox,oy,size,sep,rr1,gg1,bb1,rr2,gg2,bb2){
  var out=[];
  var half=Math.floor(n/2);
  for(var i=0;i<n;i++){
    var side=i<half?-1:1;
    var a=rnd(0,Math.PI*2);
    var d=rnd(10,size*.45);
    var x=ox+side*(sep+Math.cos(a)*d*Math.abs(Math.cos(a)));
    var y=oy+Math.sin(a)*d*.7;
    if(i<half)out.push({tx:x,ty:y,rr:rr1,gg:gg1,bb:bb1,r:rnd(.5,2)});
    else out.push({tx:x,ty:y,rr:rr2,gg:gg2,bb:bb2,r:rnd(.5,2)});
  }
  return out;
}

function shapeNeural(n,ox,oy,size){
  /* Node cluster network */
  var nodes=[];
  var nNodes=Math.min(14,Math.floor(n/200));
  for(var k=0;k<nNodes;k++)nodes.push({x:ox+rnd(-size*.45,size*.45),y:oy+rnd(-size*.38,size*.38)});
  var out=[];
  for(var i=0;i<n;i++){
    var nd=nodes[i%nNodes];
    var spread=rnd(0,size*.12);
    var a=rnd(0,Math.PI*2);
    var heat=1-spread/(size*.12);
    out.push({
      tx:nd.x+Math.cos(a)*spread,
      ty:nd.y+Math.sin(a)*spread,
      rr:Math.round(lerp(100,38,heat)),
      gg:Math.round(lerp(180,232,heat)),
      bb:255,
      r:rnd(.4,1.8)
    });
  }
  return out;
}

function shapeWave(n,ox,oy,width,amp,rr,gg,bb){
  var out=[];
  for(var i=0;i<n;i++){
    var t=i/n;
    var x=ox-width/2+t*width;
    var y=oy+Math.sin(t*Math.PI*4)*amp+rnd(-amp*.12,amp*.12);
    out.push({tx:x,ty:y,rr:rr,gg:gg,bb:bb,r:rnd(.5,2)});
  }
  return out;
}

function shapeScatter(n,ox,oy,size){
  var out=[];
  for(var i=0;i<n;i++){
    out.push({tx:rnd(ox-size,ox+size),ty:rnd(oy-size*.6,oy+size*.6),rr:80,gg:120,bb:200,r:rnd(.3,1.2)});
  }
  return out;
}

function shapeCrystalGrid(n,ox,oy,size,rr,gg,bb){
  var out=[];
  var cols=Math.round(Math.sqrt(n)*1.6);
  var rows=Math.round(n/cols);
  var sx=size*2/cols;
  var sy=size*1.3/rows;
  for(var i=0;i<n;i++){
    var col=i%cols;
    var row=Math.floor(i/cols);
    var jitter=(row%2)*.5;
    out.push({
      tx:ox-size+(col+jitter)*sx+rnd(-1,1),
      ty:oy-size*.65+row*sy+rnd(-1,1),
      rr:rr,gg:gg,bb:bb,r:rnd(.4,1.5)
    });
  }
  return out;
}

/* Shape spec function — returns array of particle targets for given domain+phase */
function getShapeSpec(domain,phase,N){
  var x=cx(),y=cy(),sW=W(),sH=H();
  var sz=Math.min(sW,sH);
  switch(domain){
    case 'bigbang':
      /* 1→single dot, 2→singularity flash, 3→explosion, 4→spiral galaxy, 5→CMB scatter */
      if(phase===0)return shapePoint(N,x,y);
      if(phase===1)return shapePoint(Math.min(N,80),x,y).concat(shapeRing(N-80,x,y,8,4,255,240,200));
      if(phase===2)return shapeExplosion(N,x,y,5,sz*.7,255,180,80);
      if(phase===3)return shapeSpiral(N,x,y,sz*.44,3,120,160,255);
      return shapeScatter(N,x,y,sz*.5);

    case 'heartbreak':
      /* 1→two faces form, 2→two warm fields, 3→fracture appears, 4→cold separation, 5→two cold fields apart */
      if(phase===0)return shapeTwoFaces(N,'😊','😊',x,y,sz*.38);
      if(phase===1)return shapeFracture(N,x,y,sz*.42,sz*.02,220,140,100,200,120,160);
      if(phase===2)return shapeFracture(N,x,y,sz*.44,sz*.08,180,100,120,140,80,160);
      if(phase===3)return shapeFracture(N,x,y,sz*.44,sz*.18,80,60,140,60,40,120);

      /* 1→two scattered fields far apart, 2→two faces form, 3→fields merge centre, 4→single warm face, 5→bright unified field */

      if(phase===1)return shapeTwoFaces(N,'😊','😊',x,y,sz*.42);

}

/* ═══ FORMATION ENGINE ═══ */
var targets=[];
var birthPositions=[];
var particleColors=[];
var particleSizes=[];
var particleDelays=[];
var N=0;

function initFormation(domain,phase){
  var n=Math.min(MAX_P,Math.round(40000*simSpeed));
  N=n;
  var spec=getShapeSpec(domain,phase,n);
  targets=new Float32Array(n*2);
  birthPositions=new Float32Array(n*2);
  particleColors=new Uint8Array(n*3);
  particleSizes=new Float32Array(n);
  particleDelays=new Float32Array(n);
  var px=new Float32Array(n*2); // current positions
  var maxDelay=phase===0?4000:2500;
  for(var i=0;i<n;i++){
    var s=spec[i]||spec[i%spec.length];
    targets[i*2]=s.tx||cx();
    targets[i*2+1]=s.ty||cy();
    particleColors[i*3]=s.rr||255;
    particleColors[i*3+1]=s.gg||255;
    particleColors[i*3+2]=s.bb||255;
    particleSizes[i]=s.r||1;
    particleDelays[i]=Math.random()*maxDelay;
    /* Birth position */
    var bx,by;
    if(phase===0){
      /* Everything born from a single point */
      bx=cx()+rnd(-3,3);by=cy()+rnd(-3,3);
    } else {
      /* Born from current position (wherever they are now) */
      bx=px[i*2]||rnd(0,W());
      by=px[i*2+1]||rnd(0,H());
    }
    birthPositions[i*2]=bx;
    birthPositions[i*2+1]=by;
    px[i*2]=bx;px[i*2+1]=by;
  }
  /* Store current positions for next phase birth */
  window._lastPositions=px;
  formationT=0;
}

function transitionFormation(domain,phase){
  /* Particles travel FROM their current (last) positions TO new targets */
  var n=N;
  var spec=getShapeSpec(domain,phase,n);
  var prev=window._lastPositions||new Float32Array(n*2);
  targets=new Float32Array(n*2);
  birthPositions=new Float32Array(n*2);
  particleColors=new Uint8Array(n*3);
  particleSizes=new Float32Array(n);
  particleDelays=new Float32Array(n);
  var maxDelay=2000;
  for(var i=0;i<n;i++){
    var s=spec[i%spec.length];
    targets[i*2]=s.tx||cx();
    targets[i*2+1]=s.ty||cy();
    particleColors[i*3]=s.rr||255;
    particleColors[i*3+1]=s.gg||255;
    particleColors[i*3+2]=s.bb||255;
    particleSizes[i]=s.r||1;
    particleDelays[i]=Math.random()*maxDelay;
    birthPositions[i*2]=prev[i*2]||cx();
    birthPositions[i*2+1]=prev[i*2+1]||cy();
  }
  formationT=0;
}

/* Snapshot current rendered positions for next transition */
function snapshotPositions(elapsed,totalDur){
  var snap=new Float32Array(N*2);
  for(var i=0;i<N;i++){
    var delay=particleDelays[i];
    var t=clamp((elapsed-delay)/totalDur,0,1);
    var te=easeOut(t);
    snap[i*2]=lerp(birthPositions[i*2],targets[i*2],te);
    snap[i*2+1]=lerp(birthPositions[i*2+1],targets[i*2+1],te);
  }
  window._lastPositions=snap;
}

/* ═══ RENDER LOOP ═══ */
var lastFrame=0;
var elapsed=0;
var FORMATION_DUR=6000; /* ms for particles to reach target */
var BREATHE_AMP=1.8; /* breathing noise amplitude */
var globalT=0;

function renderLoop(ts){
  requestAnimationFrame(renderLoop);
  if(paused)return;
  var dt=Math.min(ts-lastFrame,50)*simSpeed;
  lastFrame=ts;
  elapsed+=dt;
  formationT+=dt;
  globalT+=dt;

  ctx.fillStyle='rgba(2,4,14,0.18)';
  ctx.fillRect(0,0,W(),H());

  var FDur=FORMATION_DUR;

  for(var i=0;i<N;i++){
    var delay=particleDelays[i];
    var t=clamp((formationT-delay)/FDur,0,1);
    var te=easeOut(t);

    var bx=birthPositions[i*2],by=birthPositions[i*2+1];
    var tx=targets[i*2],ty=targets[i*2+1];

    /* Formed position */
    var fx=lerp(bx,tx,te);
    var fy=lerp(by,ty,te);

    /* Breathing noise after formation */
    var formed=t>0.95;
    var bNoise=formed?1:t;
    var angle=globalT*.0008+i*.137;
    fx+=Math.sin(angle)*BREATHE_AMP*bNoise;
    fy+=Math.cos(angle*1.3)*BREATHE_AMP*bNoise;

    var alpha=t<0.02?0:Math.min(t*3,1);
    var rr=particleColors[i*3];
    var gg=particleColors[i*3+1];
    var bb=particleColors[i*3+2];
    var sz=particleSizes[i]*(0.5+te*.8);

    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgb('+rr+','+gg+','+bb+')';
    ctx.beginPath();
    ctx.arc(fx,fy,sz,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  /* Snapshot positions just before phase auto-advance */
  if(formationT>FORMATION_DUR*1.4){
    snapshotPositions(formationT,FDur);
  }
}

function streamWords(text){
  if(wordStreamTimer)clearInterval(wordStreamTimer);
  var el=document.getElementById('answerText');

/* ═══ NARRATION UI ═══ */
function updateNarr(){
  var narrs=NARR[simDomain];
  if(!narrs)return;
  var ph=narrs[simPhase]||narrs[0];
  document.getElementById('narrPhaseLabel').textContent=ph[0];
  var pct=((simPhase+1)/narrs.length*100).toFixed(0);
  document.getElementById('phaseProgressFill').style.width=pct+'%';
  /* Flash phase label in sim area */
  var flash=document.getElementById('phaseFlash');
  flash.textContent=ph[0].split('·')[1]||ph[0];
  flash.classList.add('show');
  setTimeout(function(){flash.classList.remove('show');},1800);
  streamWords(ph[1]);
  /* Phase dots */
  var dots=document.getElementById('narrDots');dots.innerHTML='';
  for(var i=0;i<narrs.length;i++){
    var d=document.createElement('div');d.className='ndot'+(i===simPhase?' on':'');
    (function(idx){d.onclick=function(){goToPhase(idx);};})(i);
    dots.appendChild(d);
  }
  if(voiceOn)speakNarr(ph[1]);
  /* Schedule auto-advance */
  if(phaseAutoTimer)clearTimeout(phaseAutoTimer);
  var narrs2=NARR[simDomain];
  if(simPhase<narrs2.length-1){
    phaseAutoTimer=setTimeout(function(){
      snapshotPositions(formationT,FORMATION_DUR);
      simPhase++;
      transitionFormation(simDomain,simPhase);
      updateNarr();
    },PHASE_DUR);
  }
}

function goToPhase(ph){
  if(phaseAutoTimer)clearTimeout(phaseAutoTimer);
  snapshotPositions(formationT,FORMATION_DUR);
  simPhase=ph;
  transitionFormation(simDomain,simPhase);
  updateNarr();
}

function nextPhase(){
  var narrs=NARR[simDomain];
  if(narrs&&simPhase<narrs.length-1)goToPhase(simPhase+1);
}

/* ═══ VOICE ═══ */
async function speakNarr(text){
  if(!voiceOn)return;
  if(voiceAudio){voiceAudio.pause();voiceAudio=null;}
  document.getElementById('voiceBadge').classList.add('show');
  try{
    var res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+ELEVEN_VOICE+'/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json','xi-api-key':ELEVEN_KEY},
      body:JSON.stringify({text:text,model_id:'eleven_turbo_v2',voice_settings:{stability:.44,similarity_boost:.82}})
    });
    if(!res.ok)throw new Error(res.status);
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    voiceAudio=new Audio(url);
    voiceAudio.onended=function(){URL.revokeObjectURL(url);voiceAudio=null;document.getElementById('voiceBadge').classList.remove('show');};
    voiceAudio.onerror=function(){document.getElementById('voiceBadge').classList.remove('show');};
    voiceAudio.play();
  }catch(e){document.getElementById('voiceBadge').classList.remove('show');}
}

function toggleVoice(){
  voiceOn=!voiceOn;
  document.getElementById('voiceIco').textContent=voiceOn?'🔊':'🔇';
  document.getElementById('voiceBtn').classList.toggle('on',voiceOn);
  if(!voiceOn&&voiceAudio){voiceAudio.pause();voiceAudio=null;document.getElementById('voiceBadge').classList.remove('show');}
  else if(voiceOn){var narrs=NARR[simDomain];if(narrs&&narrs[simPhase])speakNarr(narrs[simPhase][1]);}
}

/* ═══ ASK QUESTION ═══ */
async function askQuestion(){
  var q=(document.getElementById('mainQ').value||'').trim();if(!q)return;
  var btn=document.getElementById('askBtn');btn.classList.add('busy');btn.textContent='…';
  document.getElementById('answerText').innerHTML='';
  document.getElementById('narrPhaseLabel').textContent='Forming…';
  var key=smartRoute(q);
  var pill=document.querySelector('.dpill[data-key="'+key+'"]');
  /* Start simulation immediately */
  simDomain=key;simPhase=0;
  if(phaseAutoTimer)clearTimeout(phaseAutoTimer);
  document.querySelectorAll('.dpill').forEach(function(p){p.classList.remove('active');p.style.background='';p.style.color='';});
  if(pill){pill.classList.add('active');pill.style.background=DC[key]||'#26e8b0';pill.style.color='#02040e';}
  domIdx=DOMAIN_ORDER.indexOf(key);
  initFormation(key,0);
  /* Fetch question-specific narration in background */
  var gotNarr=false;
  try{
    var res=await fetch(SB_URL+'/functions/v1/simulate',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({question:q,domain:key})
    });
    var data=await res.json();
    if(data.narration&&Array.isArray(data.narration)&&data.narration.length>=3){
      var clean=data.narration.filter(function(p){
        return Array.isArray(p)&&p[0]&&p[1]&&p[1].length>20
          &&p[1].indexOf('this simulation')<0&&p[1].indexOf('This simulation')<0;
      });
      if(clean.length>=3){NARR[key]=clean;gotNarr=true;}
    }
  }catch(e){}
  updateNarr();
  btn.classList.remove('busy');btn.textContent='Simulate ⚡';
  currentLikes=0;document.getElementById('likeCount').textContent='0';
  saveSimulation(q,key);
}

    });

    if(d&&d[0])currentSimId=d[0].id;
  }catch(e){}
}

  document.getElementById('lodOv').classList.add('gone');
  updateNarr();
  if(urlQ){
    setTimeout(function(){
      document.getElementById('mainQ').value=decodeURIComponent(urlQ);
      autoResize(document.getElementById('mainQ'));
      askQuestion();
    },400);
  }
}
boot();
</script>
