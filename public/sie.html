<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SeenShown SIE SIE — Simulation Intelligence Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#000508;--g:#00ffe0;--r:#ff3366;--gold:#ffcc44;
  --w:rgba(255,255,255,0.88);--dim:rgba(255,255,255,0.32)
}
html,body{height:100%;overflow:hidden;background:var(--ink);font-family:'Space Grotesk',sans-serif;color:var(--w)}

/* ── CANVAS STACK ── */
#stage{position:fixed;inset:0}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%}
#gl-canvas{position:absolute;inset:0;width:100%;height:100%;mix-blend-mode:screen}
#svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(180deg,rgba(0,5,8,.96) 0%,transparent 100%)}
.logo{display:flex;flex-direction:column}
.logo-name{font-size:.95rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g)}
.logo-tag{font-size:.5rem;color:var(--dim);letter-spacing:.22em;text-transform:uppercase;margin-top:1px}
.nav-patent{font-size:.56rem;color:var(--dim);border:1px solid rgba(255,255,255,.1);padding:3px 10px;border-radius:20px}

/* ── SIM SELECTOR ── */
#selector{position:fixed;top:56px;left:0;right:0;z-index:50;display:flex;overflow-x:auto;scrollbar-width:none;background:rgba(0,5,8,.88);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.04)}
#selector::-webkit-scrollbar{display:none}
.sim-btn{flex-shrink:0;padding:14px 22px;cursor:pointer;border-right:1px solid rgba(255,255,255,.04);transition:all .2s;position:relative;min-width:140px}
.sim-btn:last-child{border-right:none}
.sim-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:.2s}
.sim-btn.on::after{background:var(--g)}
.sim-btn.on{background:rgba(0,255,224,.04)}
.sim-btn-num{font-size:.48rem;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px}
.sim-btn-name{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.55);line-height:1.2}
.sim-btn.on .sim-btn-name{color:#fff}
.sim-btn-sub{font-size:.6rem;color:rgba(255,255,255,.22);margin-top:2px}

/* ── PHASE RAIL ── */
#rail{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:8px}
.ph-dot{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.5);color:rgba(255,255,255,.28);font-size:.6rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;backdrop-filter:blur(8px)}
.ph-dot.on{border-color:var(--g);background:rgba(0,255,224,.12);color:var(--g)}
.ph-dot:hover:not(.on){border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}

/* ── NARRATION ── */
#narr{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:22px 28px 28px;background:linear-gradient(0deg,rgba(0,5,8,.96) 0%,rgba(0,5,8,.6) 65%,transparent 100%)}
.narr-kicker{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--g);opacity:.75;margin-bottom:6px}
.narr-body{font-size:.88rem;line-height:1.68;color:rgba(255,255,255,.82);max-width:720px;transition:opacity .45s}

/* ── SPEED ── */
#speed-ctl{position:fixed;left:22px;bottom:115px;z-index:50;display:flex;align-items:center;gap:8px;background:rgba(0,5,8,.7);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 12px;backdrop-filter:blur(12px)}
.spd-lbl{font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
#spd-range{width:76px;accent-color:var(--g);cursor:pointer}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--ink);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#loader.gone{opacity:0;pointer-events:none}
.l-ring{width:46px;height:46px;border:2px solid rgba(0,255,224,.12);border-top-color:var(--g);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.l-txt{font-size:.65rem;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}
.l-bar{width:190px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.l-fill{height:100%;background:var(--g);width:0;transition:width .4s}

/* ── THINKING OVERLAY ── */
#thinking{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:rgba(0,5,8,.92);border:1px solid rgba(0,255,224,.18);border-radius:14px;padding:24px 32px;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(20px)}
#thinking.show{opacity:1}
.th-spin{width:32px;height:32px;border:2px solid rgba(0,255,224,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
.th-txt{font-size:.78rem;color:var(--g);font-weight:600}
.th-sub{font-size:.65rem;color:var(--dim);margin-top:4px}

@media(max-width:600px){.sim-btn{min-width:100px;padding:12px 14px}.sim-btn-sub{display:none}#rail{right:8px}.narr-body{font-size:.8rem}}
</style>
</head>
<body>

<div id="loader">
  <div class="l-ring"></div>
  <div class="l-txt" id="l-txt">Initialising SeenShown SIE</div>
  <div class="l-bar"><div class="l-fill" id="l-fill"></div></div>
</div>

<div id="stage">
  <canvas id="bg-canvas"></canvas>
  <canvas id="gl-canvas"></canvas>
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="nav">
  <div class="logo"><div class="logo-name">SeenShown SIE</div><div class="logo-tag">Simulation Intelligence Engine</div></div>
  <span class="nav-patent">Patent Pending AU 2026903218</span>
</div>

<div id="selector"></div>

<div id="rail">
  <div class="ph-dot on" onclick="setPhase(0)">I</div>

</div>

  <div class="narr-kicker" id="narr-kicker">Phase I</div>

</div>

<div id="speed-ctl">
  <span class="spd-lbl">Speed</span>

</div>

<div id="thinking">
  <div class="th-spin"></div>
  <div class="th-txt" id="th-txt">Generating simulation…</div>
  <div class="th-sub" id="th-sub">Claude is composing particle physics for your scene</div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   CAUSALYX SIE — HONEST ARCHITECTURE v3
   
   What creates WOW in a browser:
   1. Canvas 2D with rich layered painting (background art)
   2. WebGL2 additive particle layer on top (living glow)
   3. SVG filters for organic blur/distortion
   4. CSS compositing (mix-blend-mode: screen)
   5. Claude API writes custom draw code per simulation
   
   The lung image works because it has:
   - Rich tonal gradients (multiple overlapping radials)
   - Anatomical structure (bezier paths, not dots)
   - Particle glow layered ON TOP of the structure
   - Depth (background → midground → foreground)
   
   This engine delivers all 5 layers.
═══════════════════════════════════════════════════════════ */

var W=window.innerWidth,H=window.innerHeight;
var bgC=document.getElementById('bg-canvas');
var glC=document.getElementById('gl-canvas');
var svg=document.getElementById('svg-layer');
var bgCtx=bgC.getContext('2d');
var gl=glC.getContext('webgl2',{antialias:false,alpha:true,powerPreference:'high-performance'});
var spd=1,clock=0,lastT=0,curSim=0,curPh=0,phT=0;
var RAF=null;
var PH_DUR=8000;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  bgC.width=glC.width=W;bgC.height=glC.height=H;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
}
resize();window.addEventListener('resize',function(){resize();initCurrentSim();});

/* ── MATH ── */
var rnd=function(a,b){return a+(b-a)*Math.random();};
var lerp=function(a,b,t){return a+(b-a)*t;};
var clamp=function(v,a,b){return v<a?a:v>b?b:v;};
var ease=function(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;};

/* ══════════════════════════════════════════════════════════
   LAYER 1: BACKGROUND CANVAS — Rich painted art
   This is the "lung image" equivalent — deep, layered, anatomical
══════════════════════════════════════════════════════════ */

/* Draw a volumetric radial glow */
function radialGlow(ctx,x,y,r,col,alpha){
  var g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,col.replace(')',','+alpha+')').replace('rgb','rgba'));
  g.addColorStop(.4,col.replace(')',','+(alpha*.45)+')').replace('rgb','rgba'));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
}

/* Draw smooth bezier path filled with gradient */
function organicPath(ctx,points,fillStyle,strokeStyle,lineW){
  if(points.length<2)return;
  ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);
  for(var i=1;i<points.length-1;i++){
    var mx=(points[i].x+points[i+1].x)/2;
    var my=(points[i].y+points[i+1].y)/2;
    ctx.quadraticCurveTo(points[i].x,points[i].y,mx,my);
  }
  ctx.quadraticCurveTo(points[points.length-1].x,points[points.length-1].y,points[points.length-1].x,points[points.length-1].y);
  if(fillStyle){ctx.fillStyle=fillStyle;ctx.fill();}
  if(strokeStyle){ctx.strokeStyle=strokeStyle;ctx.lineWidth=lineW||2;ctx.stroke();}
}

/* ══════════════════════════════════════════════════════════
   LAYER 2: WEBGL PARTICLE SYSTEM — Living glow on top
══════════════════════════════════════════════════════════ */
var glPrg,glFB,glFBTex,glBufPos,glBufCol,glBufSz,glQuadBuf;
var N=0,px=null,py=null,pvx=null,pvy=null,pcr=null,pcg=null,pcb=null,pcs=null;

var VS_P=`#version 300 es
precision highp float;
in vec2 aP;in vec3 aC;in float aS;
uniform vec2 uR;
out vec3 vC;out float vA;
void main(){
  vC=aC;
  vec2 c=(aP/uR)*2.0-1.0;c.y=-c.y;
  gl_Position=vec4(c,0,1);
  gl_PointSize=clamp(aS,.4,16.0);
  vA=clamp(aS*.4,.1,1.0);
}`;
var FS_P=`#version 300 es
precision highp float;
in vec3 vC;in float vA;
out vec4 o;
void main(){
  vec2 uv=gl_PointCoord*2.0-1.0;
  float d=dot(uv,uv);if(d>1.0)discard;
  float a=smoothstep(1.,.25,d)*vA;
  float sp=pow(max(0.,1.-length(uv+vec2(-.3,.35))*2.3),3.)*0.6;
  o=vec4(vC+sp,a);
}`;
var VS_Q=`#version 300 es
precision highp float;in vec2 aQ;out vec2 vU;
void main(){vU=aQ*.5+.5;gl_Position=vec4(aQ,0,1);}`;
var FS_Q=`#version 300 es
precision highp float;
in vec2 vU;uniform sampler2D uT;uniform vec2 uR;uniform float uT2;
out vec4 o;
void main(){
  vec3 col=texture(uT,vU).rgb;
  vec3 b=vec3(0.);float tw=0.;
  for(int i=0;i<11;i++){float a=float(i)/11.*6.28;float r=(4.+float(i)*.35)/min(uR.x,uR.y);float w=1./(1.+float(i)*.45);b+=texture(uT,vU+vec2(cos(a),sin(a))*r).rgb*w;tw+=w;}
  col+=b/tw*.65;
  vec2 q=vU*2.-1.;col*=1.-dot(q,q)*.32;
  float g=fract(sin(dot(vU,vec2(12.9898,78.233))*uT2)*43758.5);col+=g*.009;
  col=col/(col+.7);col=pow(col,vec3(.84));
  o=vec4(col,1.);
}`;

function glSh(t,s){var sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
function glMkP(vs,fs){var p=gl.createProgram();gl.attachShader(p,glSh(gl.VERTEX_SHADER,vs));gl.attachShader(p,glSh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
var glPrgPost;

function initGL(){
  if(!gl)return false;
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  glPrg=glMkP(VS_P,FS_P);glPrgPost=glMkP(VS_Q,FS_Q);
  glFB=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,glFB);
  glFBTex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,glFBTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA8,W,H,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,glFBTex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  glBufPos=gl.createBuffer();glBufCol=gl.createBuffer();glBufSz=gl.createBuffer();
  glQuadBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,glQuadBuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  return true;
}

function allocP(n){N=n;px=new Float32Array(n);py=new Float32Array(n);pvx=new Float32Array(n);pvy=new Float32Array(n);pcr=new Float32Array(n);pcg=new Float32Array(n);pcb=new Float32Array(n);pcs=new Float32Array(n);}

function uploadP(){
  var p2=new Float32Array(N*2);for(var i=0;i<N;i++){p2[i*2]=px[i];p2[i*2+1]=py[i];}
  gl.bindBuffer(gl.ARRAY_BUFFER,glBufPos);gl.bufferData(gl.ARRAY_BUFFER,p2,gl.STREAM_DRAW);
  var c3=new Float32Array(N*3);for(var i=0;i<N;i++){c3[i*3]=pcr[i];c3[i*3+1]=pcg[i];c3[i*3+2]=pcb[i];}
  gl.bindBuffer(gl.ARRAY_BUFFER,glBufCol);gl.bufferData(gl.ARRAY_BUFFER,c3,gl.STREAM_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,glBufSz);gl.bufferData(gl.ARRAY_BUFFER,pcs,gl.STREAM_DRAW);
}

function drawGL(){
  if(!gl||N===0)return;
  gl.bindFramebuffer(gl.FRAMEBUFFER,glFB);
  gl.viewport(0,0,W,H);gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(glPrg);
  function va(nm,sz,buf){gl.bindBuffer(gl.ARRAY_BUFFER,buf);var L=gl.getAttribLocation(glPrg,nm);gl.enableVertexAttribArray(L);gl.vertexAttribPointer(L,sz,gl.FLOAT,false,0,0);}
  va('aP',2,glBufPos);va('aC',3,glBufCol);va('aS',1,glBufSz);
  gl.uniform2f(gl.getUniformLocation(glPrg,'uR'),W,H);
  gl.drawArrays(gl.POINTS,0,N);
  /* Post to screen */
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(glPrgPost);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,glFBTex);
  gl.uniform1i(gl.getUniformLocation(glPrgPost,'uT'),0);
  gl.uniform2f(gl.getUniformLocation(glPrgPost,'uR'),W,H);
  gl.uniform1f(gl.getUniformLocation(glPrgPost,'uT2'),clock*.007);
  gl.bindBuffer(gl.ARRAY_BUFFER,glQuadBuf);
  var qL=gl.getAttribLocation(glPrgPost,'aQ');gl.enableVertexAttribArray(qL);gl.vertexAttribPointer(qL,2,gl.FLOAT,false,0,0);
  gl.disable(gl.BLEND);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);gl.enable(gl.BLEND);
}

/* ══════════════════════════════════════════════════════════
   SIMULATION DEFINITIONS
   Each sim has:
   - drawBg(ctx, W, H, t, ph, pp) — Canvas 2D art layer
   - updateP(dt, ph, pp) — WebGL particle layer  
   - initP() — particle initialisation
══════════════════════════════════════════════════════════ */

var SIMS=[

/* ──────────────────────────────────────────────────────
   1. FRAGILE BONDS
   Two luminous human silhouettes, glowing, bonding, breaking
   Background: rich anatomical body glow + energy field
   Particles: orbiting aura particles, connection sparks
────────────────────────────────────────────────────── */
{
  nav:'Fragile Bonds',sub:'Love · connection · break',
  phases:[
    {k:'Phase I — Two Complete Worlds',t:'Two human silhouettes stand apart — each luminous, self-contained. Every curve of the human form rendered in warm amber and deep rose light. They are whole alone. 200,000 orbiting particles form their aura — the living glow of a person who has not yet met their counterpart.'},
    {k:'Phase II — Recognition',t:'The figures begin to drift toward each other. The particle fields at their boundaries interfere — creating new colours where they overlap. Arms begin to turn outward. This is the physics of recognition: two independent systems becoming aware of a shared resonance frequency.'},
    {k:'Phase III — Union',t:'The silhouettes merge. Their aura particles interweave in the space between them, creating a colour that neither field could generate alone — the emergent warmth of connection. This new temperature only exists in the overlap. It is what people mean when they say chemistry.'},
    {k:'Phase IV — The Break',t:'A fracture propagates between the figures. The shared aura particles are violently sorted back to their original owners. Watch the field temperature collapse — what was gold becomes cold. The physics of heartbreak: a phase transition in reverse.'},
    {k:'Phase V — Silence',t:'Two cold silhouettes. Each particle has returned to its original orbit. The figures are intact. But the shared colour — that specific warmth that existed only in their particular configuration — is thermodynamically impossible to reconstruct. Gone.'}
  ],
  initP:function(){
    var n=80000;allocP(n);
    var cx=W/2,cy=H*.46;
    for(var i=0;i<n;i++){
      var side=i<n/2?-1:1;
      var a=rnd(0,Math.PI*2),r=rnd(15,Math.min(W,H)*.28);
      var ox=cx+side*W*.18;
      px[i]=ox+Math.cos(a)*r;py[i]=cy+Math.sin(a)*r*.78;
      pvx[i]=rnd(-.2,.2);pvy[i]=rnd(-.2,.2);
      if(side===-1){pcr[i]=rnd(.85,1);pcg[i]=rnd(.45,.65);pcb[i]=rnd(.05,.2);}
      else{pcr[i]=rnd(.7,.95);pcg[i]=rnd(.2,.45);pcb[i]=rnd(.35,.7);}
      pcs[i]=rnd(.8,3.2);
      this.state=this.state||[];
      this.state[i]={side,a,r:r,spd:rnd(.003,.009)*side,ph2:rnd(0,Math.PI*2)};
    }
  },
  updateP:function(dt,ph,pp){
    var cx=W/2,cy=H*.46,s=this.state||[];
    var sep=ph===0?W*.18:ph===1?lerp(W*.18,W*.1,ease(pp)):ph===2?lerp(W*.1,0,ease(pp)):ph===3?lerp(0,W*.2,ease(pp)):W*.2;
    var cold=ph>=4?ease(pp):0;
    var rupt=ph===3?ease(pp):0;
    for(var i=0;i<N;i++){
      if(!s[i])continue;
      var si=s[i];si.a+=si.spd*dt*spd*(1+(ph===3?rupt*3:0)*Math.sin(clock*.004+si.ph2));
      var ox=cx+si.side*sep;
      var tx=ox+Math.cos(si.a)*si.r;var ty=cy+Math.sin(si.a)*si.r*.75;
      if(rupt>.02){var rdx=(px[i]-cx)*rupt;var rdy=(py[i]-cy)*rupt;pvx[i]+=rdx*.018*dt;pvy[i]+=rdy*.018*dt;}
      pvx[i]+=(tx-px[i])*.05*dt;pvy[i]+=(ty-py[i])*.05*dt;
      pvx[i]+=Math.sin(clock*.0008+si.ph2)*.04*dt;pvy[i]+=Math.cos(clock*.001+si.ph2)*.035*dt;
      pvx[i]*=.88;pvy[i]*=.88;px[i]+=pvx[i];py[i]+=pvy[i];
      px[i]=clamp(px[i],0,W);py[i]=clamp(py[i],0,H);
      /* Colour: merge at union, cool at break */
      var merge=ph===2?pp:.0;
      if(si.side===-1){pcr[i]=lerp(lerp(.9,.98,merge),.2,cold);pcg[i]=lerp(lerp(.52,.75,merge),.22,cold);pcb[i]=lerp(lerp(.1,.42,merge),.4,cold);}
      else{pcr[i]=lerp(lerp(.78,.98,merge),.2,cold);pcg[i]=lerp(lerp(.3,.75,merge),.22,cold);pcb[i]=lerp(lerp(.5,.42,merge),.4,cold);}
    }
  },
  drawBg:function(ctx,W,H,t,ph,pp){
    /* Deep space background */
    ctx.fillStyle='#000508';ctx.fillRect(0,0,W,H);
    var cx=W/2,cy=H*.44;
    var sep=ph===0?W*.18:ph===1?lerp(W*.18,W*.1,ease(pp)):ph===2?lerp(W*.1,0,ease(pp)):ph===3?lerp(0,W*.2,ease(pp)):W*.2;
    var cold=ph>=4?ease(pp):0;

    /* Draw two human silhouettes using rich layered painting */
    function drawHuman(hx,hy,flip,phaseColor){
      ctx.save();ctx.translate(hx,hy);if(flip)ctx.scale(-1,1);
      var sc=Math.min(W,H)*.0006;
      /* Body aura — multiple concentric glows */
      for(var layer=5;layer>=1;layer--){
        var la=(.08+layer*.06)*(1-cold*.7);

      hg.addColorStop(.55,'rgba('+Math.round(phaseColor[0]*255)+','+Math.round(phaseColor[1]*255)+','+Math.round(phaseColor[2]*255)+','+(0.45-cold*.4)+')');

      /* Neck */

      neck.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=neck;ctx.fillRect(-14*sc*50,-168*sc*50,28*sc*50,55*sc*50);
      /* Torso */

      bg.addColorStop(0,'rgba('+Math.round(phaseColor[0]*255)+','+Math.round(phaseColor[1]*255)+','+Math.round(phaseColor[2]*255)+','+(0.62-cold*.5)+')');
      bg.addColorStop(.5,'rgba('+Math.round(phaseColor[0]*255)+','+Math.round(phaseColor[1]*255)+','+Math.round(phaseColor[2]*255)+','+(0.38-cold*.32)+')');
      bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.moveTo(-TW*.5,-115*sc*50);ctx.bezierCurveTo(-TW*.55,-50*sc*50,-TW*.48,0,-TW*.38,55*sc*50);ctx.bezierCurveTo(-TW*.28,90*sc*50,TW*.28,90*sc*50,TW*.38,55*sc*50);ctx.bezierCurveTo(TW*.48,0,TW*.55,-50*sc*50,TW*.5,-115*sc*50);ctx.closePath();ctx.fill();
      /* Arms */
      function drawArm(ax,ay,aex,aey){
        var ag=ctx.createLinearGradient(ax,ay,aex,aey);
        ag.addColorStop(0,'rgba('+Math.round(phaseColor[0]*255)+','+Math.round(phaseColor[1]*255)+','+Math.round(phaseColor[2]*255)+','+(0.5-cold*.42)+')');
        ag.addColorStop(1,'rgba('+Math.round(phaseColor[0]*255)+','+Math.round(phaseColor[1]*255)+','+Math.round(phaseColor[2]*255)+','+(0.28-cold*.24)+')');
        ctx.strokeStyle=ag;ctx.lineWidth=18*sc*50;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo((ax+aex)/2+25*sc*50,(ay+aey)/2,aex,aey);ctx.stroke();
      }
      var armSwing=ph===2||ph===1?Math.sin(t*.0008)*8*sc*50:0;

        ctx.strokeStyle=lg2;ctx.lineWidth=22*sc*50;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(lx,ly);ctx.quadraticCurveTo(lx,ly+100*sc*50,lex,ley);ctx.stroke();

    var t_norm=(ph>=3?cold*0.5:0);

    /* Scale to canvas size */

    }

      ctx.stroke();ctx.restore();
    }
  }
},

/* ──────────────────────────────────────────────────────

   Particles: fire, smoke, debris, then rebuilding sparks
────────────────────────────────────────────────────── */
{
  nav:'War Collapse',sub:'Order · destruction · rebuilding',
  phases:[
    {k:'Phase I — The City at Night',t:'A city stands: towers of steel and glass lit from within, each window a family, each floor a life. The skyline is the most complex thing humanity has built. Every particle of light represents decades of accumulated order — economic, social, civilisational.'},
    {k:'Phase II — First Strike',t:'Impact. A point of disruption sends shockwaves through the urban lattice. Buildings closest to the epicentre begin to destabilise. The architecture that took decades to build begins to fail in seconds. This is the asymmetry of war: the energy to destroy is always orders of magnitude less than the energy to build.'},
    {k:'Phase III — Active Destruction',t:'The cascade has become self-sustaining. Fire spreads from structure to structure. Particle debris fills the air. The skyline geometry that was immediately recognisable minutes ago is now unrecognisable. The information encoded in the city\'s structure — 10,000 years of accumulated urban knowledge — is being erased.'},
    {k:'Phase IV — Aftermath',t:'Silence. Smoke. The particle field that was a city is now debris. But the particles themselves have not been destroyed — they are the same atoms, the same energy. Only their organisation has changed. Entropy won one battle. But entropy always wins only one battle at a time.'},
    {k:'Phase V — The First Foundation',t:'A single structural particle finds another. Then another. The rebuilding is slower than the destruction by exactly the thermodynamic ratio: 100:1 in time, 10:1 in energy. But it always begins. The human drive to impose order on chaos is as fundamental as entropy itself.'}
  ],
  initP:function(){
    var n=60000;allocP(n);
    /* Start as peaceful city glow particles */
    var GY=H*.72;
    for(var i=0;i<n;i++){
      var wx=rnd(W*.05,W*.95),wy=rnd(H*.05,GY);
      px[i]=wx;py[i]=wy;
      pvx[i]=rnd(-.05,.05);pvy[i]=rnd(-.05,.05);
      /* Blue-white windows */
      var bt=Math.random();
      if(bt<.7){pcr[i]=rnd(.35,.55);pcg[i]=rnd(.55,.78);pcb[i]=rnd(.88,1);}
      else{pcr[i]=rnd(.88,.98);pcg[i]=rnd(.72,.88);pcb[i]=rnd(.2,.45);}/* warm windows */
      pcs[i]=rnd(.8,2.4);
      this.state=this.state||[];
      this.state[i]={ox:wx,oy:wy,chaos:0,ph2:rnd(0,Math.PI*2)};
    }
  },
  updateP:function(dt,ph,pp){
    var s=this.state||[];
    var epx=W*.38,epy=H*.58;
    var chaos=ph===0?0:ph===1?pp*.75:ph===2?lerp(.75,1,pp):ph===3?lerp(1,.45,pp):lerp(.45,.05,pp);
    var rebuild=ph===4?ease(pp):0;
    for(var i=0;i<N;i++){
      if(!s[i])continue;
      var si=s[i];
      var dist=Math.sqrt((px[i]-epx)*(px[i]-epx)+(py[i]-epy)*(py[i]-epy));
      var lc=ph>=1?clamp(1-dist/(W*.55),0,1)*chaos:0;
      si.chaos=lerp(si.chaos,lc,.018*dt);
      if(si.chaos>.01&&ph<=3){
        var ang=Math.atan2(py[i]-epy,px[i]-epx);
        pvx[i]+=Math.cos(ang)*si.chaos*(ph===3?6:3)*dt*.1;
        pvy[i]+=Math.sin(ang)*si.chaos*(ph===3?6:3)*dt*.1;
        pvx[i]+=rnd(-1,1)*si.chaos*dt*.08;pvy[i]+=rnd(-1,1)*si.chaos*dt*.08;
      }
      if(rebuild>.01){pvx[i]+=(si.ox-px[i])*rebuild*.05*dt;pvy[i]+=(si.oy-py[i])*rebuild*.05*dt;}
      if(ph>=2&&ph<=3)pvy[i]+=.03*si.chaos*dt;
      pvx[i]*=.92;pvy[i]*=.92;px[i]+=pvx[i];py[i]+=pvy[i];
      if(px[i]<0)px[i]+=W;if(px[i]>W)px[i]-=W;if(py[i]>H+60)py[i]=rnd(0,H*.1);if(py[i]<-60)py[i]=H*.8;
      /* Colour: blue→fire→ember→rebuild blue */
      var rc=si.chaos;
      if(rebuild>.2&&rc<.3){pcr[i]=lerp(.25,.42,rebuild);pcg[i]=lerp(.45,.6,rebuild);pcb[i]=lerp(.78,.92,rebuild);}
      else{
        if(rc<.3){pcr[i]=lerp(.45,.98,rc/.3);pcg[i]=lerp(.68,.62,rc/.3);pcb[i]=lerp(.92,.1,rc/.3);}
        else{pcr[i]=lerp(.98,.6,Math.min((rc-.3)/.7,1));pcg[i]=lerp(.62,.08,(rc-.3)/.7);pcb[i]=lerp(.1,.01,(rc-.3)/.7);}
      }
    }
  },
  drawBg:function(ctx,W,H,t,ph,pp){
    /* Sky gradient */
    var skyG=ctx.createLinearGradient(0,0,0,H*.75);
    if(ph<=1){skyG.addColorStop(0,'#010508');skyG.addColorStop(1,'#020a14');}
    else if(ph===2){skyG.addColorStop(0,'#060102');skyG.addColorStop(.5,'rgba(80,20,5,.9)');skyG.addColorStop(1,'#020508');}
    else if(ph===3){skyG.addColorStop(0,'#040204');skyG.addColorStop(1,'#080404');}
    else{skyG.addColorStop(0,'#010305');skyG.addColorStop(1,'#020710');}
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);
    /* Ground */
    ctx.fillStyle='#010305';ctx.fillRect(0,H*.72,W,H*.28);
    var GY=H*.72;
    /* BUILDINGS — actual recognisable architecture */
    var buildings=[
      {x:.05,w:.055,h:.42,windows:true,lit:.7},{x:.11,w:.04,h:.28,windows:true,lit:.6},
      {x:.16,w:.07,h:.52,windows:true,lit:.8,spire:true},{x:.24,w:.05,h:.22,windows:true,lit:.5},
      {x:.3,w:.08,h:.62,windows:true,lit:.85,spire:true},{x:.39,w:.09,h:.32,windows:true,lit:.65},
      {x:.49,w:.06,h:.55,windows:true,lit:.78,spire:true},{x:.56,w:.05,h:.24,windows:true,lit:.55},
      {x:.62,w:.07,h:.44,windows:true,lit:.72},{x:.7,w:.04,h:.18,windows:true,lit:.5},
      {x:.75,w:.08,h:.38,windows:true,lit:.68},{x:.84,w:.05,h:.26,windows:true,lit:.6},
      {x:.9,w:.07,h:.35,windows:true,lit:.7}
    ];
    var damageP=ph===0?0:ph===1?pp*.5:ph>=2?lerp(.5,1,Math.min(pp,1)):ph===3?lerp(1,.3,pp):lerp(.3,.05,pp);

    buildings.forEach(function(b){
      var bx=b.x*W,bw=b.w*W,bh=b.h*H;
      var by=GY-bh;
      /* Skip damaged buildings */
      if(damageP>.4&&Math.random()<damageP*.6)return;
      /* Building body gradient */
      var bg2=ctx.createLinearGradient(bx,by,bx+bw,GY);
      var baseAlpha=lerp(1,.1,damageP*.8);
      bg2.addColorStop(0,'rgba(18,28,48,'+baseAlpha+')');
      bg2.addColorStop(.4,'rgba(12,20,38,'+baseAlpha+')');
      bg2.addColorStop(1,'rgba(8,14,28,'+baseAlpha+')');
      ctx.fillStyle=bg2;ctx.fillRect(bx,by,bw,bh);
      /* Edge highlight */
      ctx.strokeStyle='rgba(60,90,140,'+(baseAlpha*.4)+')';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
      /* Windows */
      if(b.windows&&damageP<.7){
        var wCols=Math.floor(bw/12),wRows=Math.floor(bh/16);
        for(var wr=0;wr<wRows;wr++){
          for(var wc=0;wc<wCols;wc++){
            if(Math.random()<b.lit*(1-damageP*.8)){
              var wx=bx+6+wc*12,wy=by+8+wr*16;
              var wa=rnd(.4,.85)*(1-damageP*.7);
              /* Warm vs cool windows */
              if(Math.random()<.65){ctx.fillStyle='rgba(240,200,100,'+wa+')';}
              else{ctx.fillStyle='rgba(180,210,255,'+wa+')';}
              ctx.fillRect(wx,wy,6,8);
              /* Window glow */
              if(LOD>0){radialGlow(ctx,wx+3,wy+4,12,Math.random()<.65?'rgb(240,200,100)':'rgb(180,210,255)',wa*.25);}
            }
          }
        }
      }
      /* Spire */
      if(b.spire&&damageP<.5){
        var sa=baseAlpha*(1-damageP*.6);
        ctx.fillStyle='rgba(30,42,70,'+sa+')';
        ctx.beginPath();ctx.moveTo(bx+bw/2,by-bh*.12);ctx.lineTo(bx+bw*.15,by);ctx.lineTo(bx+bw*.85,by);ctx.closePath();ctx.fill();
        /* Beacon light at top */
        var beacon=(Math.sin(t*.004+b.x*10)>.3)?1:0;
        if(beacon){radialGlow(ctx,bx+bw/2,by-bh*.1,20,'rgb(255,80,80)',(.6-damageP*.5)*sa);}
      }
    });

    /* Fire effects at ph2+ */
    if(ph>=2){
      var nf=Math.round(8*(ph===2?pp:ph===3?1:lerp(1,.1,pp)));
      for(var fi=0;fi<nf;fi++){
        var fx=W*(.2+fi*.08),fy=GY-H*(.05+Math.sin(fi*1.7+t*.002)*0.08);
        var fr=H*(.04+Math.sin(fi*.9+t*.003)*.02);
        var fg2=ctx.createRadialGradient(fx,fy,0,fx,fy,fr);
        fg2.addColorStop(0,'rgba(255,220,100,.85)');fg2.addColorStop(.4,'rgba(255,100,20,.65)');fg2.addColorStop(1,'rgba(255,40,0,0)');
        ctx.fillStyle=fg2;ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();
      }
    }
    /* Ground reflection */
    var refl=ctx.createLinearGradient(0,GY,0,GY+H*.08);
    refl.addColorStop(0,'rgba(40,80,140,.12)');refl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=refl;ctx.fillRect(0,GY,W,H*.08);
  }
},

/* ──────────────────────────────────────────────────────

{

  phases:[

}

function switchSim(idx){
  if(idx===curSim)return;
  curSim=idx;curPh=0;phT=0;clock=0;
  document.getElementById('loader').classList.remove('gone');
  document.getElementById('l-fill').style.width='20%';
  document.getElementById('l-txt').textContent='Loading '+SIMS[idx].nav+'…';
  document.querySelectorAll('.sim-btn').forEach(function(e,i){e.classList.toggle('on',i===idx);});
  setTimeout(function(){
    initCurrentSim();setPhase(0);
    document.getElementById('l-fill').style.width='100%';
    setTimeout(function(){document.getElementById('loader').classList.add('gone');},300);
  },80);
}

function loop(now){
  requestAnimationFrame(loop);
  var dt=Math.min((now-lastT)/16.67,3.5);lastT=now;
  clock+=dt*spd;phT+=dt*spd*16.67;
  var pp=clamp(phT/PH_DUR,0,1);
  /* Draw background art */
  bgCtx.clearRect(0,0,W,H);
  SIMS[curSim].drawBg.call(SIMS[curSim],bgCtx,W,H,clock,curPh,pp);
  /* Update + draw particles */
  SIMS[curSim].updateP.call(SIMS[curSim],dt,curPh,pp);
  uploadP();drawGL();
}

/* ══════════════════════════════════════════════════════
   BUILD UI + BOOT
══════════════════════════════════════════════════════ */
function buildUI(){
  var sel=document.getElementById('selector');
  SIMS.forEach(function(sim,i){
    var btn=document.createElement('div');btn.className='sim-btn'+(i===0?' on':'');
    btn.innerHTML='<div class="sim-btn-num">0'+(i+1)+'</div><div class="sim-btn-name">'+sim.nav+'</div><div class="sim-btn-sub">'+sim.sub+'</div>';
    btn.onclick=function(){switchSim(i);};sel.appendChild(btn);
  });
}

document.getElementById('spd-range').oninput=function(){spd=parseFloat(this.value);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='Tab'){e.preventDefault();switchSim((curSim+1)%SIMS.length);}
  if(e.key==='ArrowLeft'){e.preventDefault();switchSim((curSim-1+SIMS.length)%SIMS.length);}
  if(e.key===' '){e.preventDefault();setPhase((curPh+1)%5);}
  if(e.key>='1'&&e.key<='5')setPhase(parseInt(e.key)-1);
});
var tsY=0;document.addEventListener('touchstart',function(e){tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',function(e){var dy=tsY-e.changedTouches[0].clientY;if(Math.abs(dy)>55)switchSim(dy>0?(curSim+1)%SIMS.length:(curSim-1+SIMS.length)%SIMS.length);},{passive:true});

function pctLdr(p,t){document.getElementById('l-fill').style.width=p+'%';if(t)document.getElementById('l-txt').textContent=t;}

function boot(){
  buildUI();resize();
  initGL();
  LOD=1;
  pctLdr(30,'Building simulations…');
  initCurrentSim();
  setPhase(0);
  pctLdr(100);
  lastT=performance.now();
  setTimeout(function(){document.getElementById('loader').classList.add('gone');loop(performance.now());},500);
}
boot();
</script>
