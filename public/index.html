<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SeenShown — Watch Any Question Come Alive</title>
<meta name="description" content="Type any question. Watch it become a real-time particle simulation.">
<meta name="theme-color" content="#02040e">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#02040e;--g:#26e8b0;--p:#7C4FD4;--w:#e8eaf0;--dim:#6b7280;--border:rgba(38,232,176,0.15);--red:#e05c5c;--gold:#f0c040}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--w);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:pan-y}

/* ═══ CANVAS — full screen ═══ */
#simCanvas{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ═══ NAV ═══ */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:48px;background:rgba(2,4,14,0.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-logo{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;color:var(--g);text-decoration:none}
.nav-tabs{display:flex;gap:1px}
.ntab{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:500;color:var(--dim);cursor:pointer;transition:all .18s;border:none;background:transparent;text-decoration:none;display:inline-block}
.ntab:hover{color:var(--w)}
.ntab.active{color:var(--g);background:rgba(38,232,176,0.08)}
.nav-right{display:flex;align-items:center;gap:6px}
.nbadge{font-size:.55rem;background:rgba(124,79,212,0.18);border:1px solid rgba(124,79,212,0.4);color:#c4a0ff;padding:2px 6px;border-radius:12px}
.inv-btn{font-size:.65rem;background:var(--g);color:#02040e;padding:4px 9px;border-radius:6px;font-weight:700;text-decoration:none;display:inline-block}

/* ═══ RIGHT RAIL — TikTok style ═══ */
#rightRail{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:150;display:flex;flex-direction:column;align-items:center;gap:20px;padding:16px 10px;pointer-events:all}
.rail-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .2s}
.rail-icon{width:44px;height:44px;border-radius:50%;background:rgba(2,4,14,0.75);border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;backdrop-filter:blur(8px)}
.rail-btn:hover .rail-icon{border-color:var(--g);background:rgba(38,232,176,0.12);transform:scale(1.08)}
.rail-btn.liked .rail-icon{border-color:var(--red);background:rgba(224,92,92,0.15)}
.rail-label{font-size:.58rem;color:var(--dim);font-weight:600;text-align:center}
.rail-label.red{color:var(--red)}
.rail-label.gold{color:var(--gold)}
.rail-label.green{color:var(--g)}
/* Vote count animation */
@keyframes popUp{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.3)}100%{transform:translateY(0) scale(1)}}
.popped{animation:popUp .35s ease}

/* ═══ DOMAIN PILLS — top ═══ */
#pills{position:fixed;top:48px;left:0;right:60px;z-index:100;display:flex;gap:4px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(180deg,rgba(2,4,14,0.88) 0%,transparent 100%)}
#pills::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:14px;border:1px solid rgba(255,255,255,0.09);color:var(--dim);cursor:pointer;transition:all .2s;background:rgba(2,4,14,0.65);white-space:nowrap}
.dpill.active{color:#02040e;font-weight:700}
.dpill:hover:not(.active){border-color:rgba(255,255,255,0.2)}

/* ═══ BOTTOM PANEL ═══ */
#bottomPanel{position:fixed;bottom:0;left:0;right:0;z-index:150;pointer-events:none}

/* ANSWER TEXT — streams word by word */
#answerWrap{pointer-events:all;padding:0 16px 10px;background:linear-gradient(0deg,rgba(2,4,14,0.97) 0%,rgba(2,4,14,0.7) 70%,transparent 100%)}
#answerText{font-size:.88rem;line-height:1.68;color:rgba(255,255,255,0.88);max-width:680px;min-height:44px;letter-spacing:.01em}
.word{display:inline;opacity:0;transition:opacity .18s}
.word.show{opacity:1}

/* NARRATION PHASE */
#narrPhase{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--g);opacity:.7;margin-bottom:4px}

/* PHASE DOTS */
#narrDots{display:flex;gap:5px;margin-bottom:7px}
.ndot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:all .18s}
.ndot.on{background:var(--g);width:14px;border-radius:3px}

/* QUESTION INPUT ROW */
#qRow{pointer-events:all;display:flex;gap:8px;padding:10px 14px 14px;background:rgba(2,4,14,0.97);border-top:1px solid rgba(255,255,255,0.05)}
#mainQ{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--w);font-size:.92rem;outline:none;transition:border-color .2s;caret-color:var(--g);resize:none;min-height:46px;max-height:90px;font-family:inherit;line-height:1.4}
#mainQ:focus{border-color:var(--g);background:rgba(255,255,255,0.09)}
#mainQ::placeholder{color:var(--dim)}
#askBtn{background:var(--g);color:#02040e;border:none;border-radius:12px;padding:12px 14px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;min-width:80px;transition:opacity .2s;align-self:flex-end}
#askBtn:hover{opacity:.88}
#askBtn.busy{opacity:.45;pointer-events:none}

/* ICON CONTROLS */
#iconRow{pointer-events:all;display:flex;align-items:center;gap:7px;padding:8px 14px 0;flex-wrap:wrap}
.ictl{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;font-size:.7rem;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .18s;white-space:nowrap}
.ictl:hover{border-color:rgba(38,232,176,0.35);color:var(--g)}
.ictl.on{border-color:var(--g);color:var(--g);background:rgba(38,232,176,0.07)}
.sdiv{width:1px;height:16px;background:rgba(255,255,255,0.07)}
#speedR{width:72px;accent-color:var(--g);cursor:pointer}
.chips{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;font-size:.6rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:4px 8px;color:var(--dim);cursor:pointer;transition:all .17s;white-space:nowrap}
.qchip:hover{border-color:var(--g);color:var(--g);background:rgba(38,232,176,0.05)}

/* ═══ THINK OVERLAY ═══ */
#thinkOv{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,4,14,0.72);opacity:0;pointer-events:none;transition:opacity .25s;z-index:180}
#thinkOv.show{opacity:1;pointer-events:all}
.tspn{width:34px;height:34px;border:3px solid rgba(38,232,176,0.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.tttl{font-size:.9rem;font-weight:600;color:var(--g);text-align:center;margin-bottom:3px}
.tsub{font-size:.72rem;color:var(--dim);text-align:center}

/* ═══ LOAD OVERLAY ═══ */
#lodOv{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .5s;z-index:300}
#lodOv.gone{opacity:0;pointer-events:none}
.lring{width:36px;height:36px;border:2px solid rgba(38,232,176,0.12);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
.ltxt{font-size:.68rem;color:var(--dim)}

/* ═══ VOICE BADGE ═══ */
#voiceBadge{position:fixed;top:56px;left:14px;background:rgba(124,79,212,0.12);border:1px solid rgba(124,79,212,0.3);border-radius:8px;padding:4px 10px;font-size:.66rem;color:#c4a0ff;opacity:0;transition:opacity .3s;z-index:160;display:flex;align-items:center;gap:5px;pointer-events:none}
#voiceBadge.show{opacity:1}
.vwave{display:flex;gap:2px;align-items:center;height:12px}
.vwave span{display:block;width:2px;background:#c4a0ff;border-radius:2px;animation:vw .6s ease-in-out infinite}
.vwave span:nth-child(1){animation-delay:0s;height:3px}
.vwave span:nth-child(2){animation-delay:.15s;height:9px}
.vwave span:nth-child(3){animation-delay:.3s;height:6px}
.vwave span:nth-child(4){animation-delay:.15s;height:11px}
.vwave span:nth-child(5){animation-delay:0s;height:3px}
@keyframes vw{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

/* ═══ RIPPLE ═══ */
.rpl{position:fixed;border-radius:50%;border:2px solid var(--g);animation:rplAnim .6s ease-out forwards;pointer-events:none;z-index:100}
@keyframes rplAnim{0%{width:8px;height:8px;opacity:.85;margin:-4px}100%{width:70px;height:70px;opacity:0;margin:-35px}}

/* ═══ COMPETITION MODE ═══ */
#compMode{position:fixed;inset:0;z-index:170;display:none;flex-direction:column}
#compMode.active{display:flex}
#compCanvas1,#compCanvas2{flex:1;display:block;width:100%}
#compDivider{height:3px;background:linear-gradient(90deg,var(--p),var(--g));position:relative;flex-shrink:0}
#compDivider::after{content:'VS';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);padding:2px 10px;border:1px solid var(--border);border-radius:8px;font-size:.65rem;font-weight:800;color:var(--g)}
#compVoteBar{position:fixed;bottom:130px;left:0;right:0;z-index:175;display:flex;gap:1rem;padding:10px 16px;pointer-events:all}
.comp-vote-btn{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s}
#voteA{background:rgba(124,79,212,0.25);color:#c4a0ff;border:1px solid rgba(124,79,212,0.4)}
#voteB{background:rgba(38,232,176,0.15);color:var(--g);border:1px solid rgba(38,232,176,0.3)}
#voteA:hover{background:rgba(124,79,212,0.4)}
#voteB:hover{background:rgba(38,232,176,0.28)}
#compScores{position:fixed;top:55px;left:0;right:0;z-index:175;display:flex;justify-content:space-between;padding:6px 16px;font-size:.7rem;font-weight:700}
#scoreA{color:#c4a0ff}
#scoreB{color:var(--g)}
#compTimer{position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:175;background:rgba(2,4,14,0.85);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.72rem;color:var(--w);font-weight:700}
#closeComp{position:fixed;top:55px;right:14px;z-index:176;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 10px;font-size:.7rem;color:var(--dim);cursor:pointer}

/* ═══ POINTS TOAST ═══ */
#ptToast{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.4);border-radius:20px;padding:6px 16px;font-size:.76rem;font-weight:700;color:var(--gold);opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
#ptToast.show{opacity:1}

/* ═══ SWIPE HINT ═══ */
#swipeHint{position:fixed;right:62px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;opacity:.35;transition:opacity .5s;z-index:50}
#swipeHint.hide{opacity:0}
.sa{font-size:1rem;color:var(--g);animation:bup 1.6s ease-in-out infinite}
@keyframes bup{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

@media(max-width:640px){
  .ntab:not(.active){display:none}
  #cePanel{display:none}
  #rightRail{gap:16px;padding:12px 8px}
  .rail-icon{width:40px;height:40px;font-size:1.05rem}
}
@media(max-height:600px){#answerText{font-size:.78rem}}
</style>
</head>
<body>

</div>

<!-- OVERLAYS -->
<div id="thinkOv">

</div>
<div id="lodOv"><div style="text-align:center"><div class="lring"></div><div class="ltxt">Initialising particle engine…</div></div></div>
<div id="voiceBadge"><div class="vwave"><span></span><span></span><span></span><span></span><span></span></div> Speaking…</div>
<div id="ptToast"></div>

<!-- SWIPE HINT -->
<div id="swipeHint">
  <span style="font-size:.52rem;color:var(--dim);writing-mode:vertical-rl">swipe</span>
  <span class="sa">↕</span>
</div>

<!-- COMPETITION MODE -->
<div id="compMode">
  <div id="compScores"><span id="scoreA">A: 0 votes</span><span id="scoreB">B: 0 votes</span></div>
  <div id="compTimer">⏱ 60s</div>
  <button id="closeComp" onclick="endCompete()">✕ Exit</button>
  <canvas id="compCanvas1"></canvas>
  <div id="compDivider"></div>
  <canvas id="compCanvas2"></canvas>
  <div id="compVoteBar">
    <button class="comp-vote-btn" id="voteA" onclick="castVote('A')">👆 Vote Top Sim</button>
    <button class="comp-vote-btn" id="voteB" onclick="castVote('B')">👆 Vote Bottom Sim</button>
  </div>
</div>

  grief:[
    ['Phase 1 · The Void Appears','Grief is not two fields separating. It is one field with a growing dark centre that pulls particles inward and slows them — the weight of absence felt from within. The brain predicted someone who is no longer there.'],
    ['Phase 2 · The Waves','Grief arrives in waves — triggered by music, by light, by ordinary objects suddenly freighted with meaning. The dark centre pulses. The amygdala fires at stimuli associated with the lost one.'],
    ['Phase 3 · Integration','With time, the brain integrates. The dark centre does not disappear — it becomes stable. The pain changes character. A living relationship with someone who is gone.']
  ],
  anger:[
    ['Phase 1 · Frustration Builds','The amygdala fires 250 milliseconds before conscious awareness. Cortisol and adrenaline flood the bloodstream. Watch the particles accelerate — the body prepares for a threat that may exist only in the mind.'],
    ['Phase 2 · Rage Peak','At peak anger the prefrontal cortex is offline. Decisions made here use 40% less grey matter. This is why we say things we cannot later explain. The particles reach maximum velocity and collision rate.'],
    ['Phase 3 · Dissipation','The parasympathetic system gradually wins. Cortisol clears in 20 minutes. But the neural pathways that fired have been reinforced. Slightly more likely to fire next time.']
  ],
  joy:[
    ['Phase 1 · The Spark','A dopaminergic signal from the ventral tegmental area. Anticipation activates before reward arrives — the brain is addicted to the prediction of good things, not only to good things themselves.'],
    ['Phase 2 · The Flood','Dopamine, serotonin, endorphins, and oxytocin cascade simultaneously. Joy at peak intensity is chemically indistinguishable from certain states of temporary madness.'],
    ['Phase 3 · Expansion','The residual warmth after joy\'s peak is serotonin — the background happiness signal. This is why good things leave afterglows. The chemistry lingers.']
  ],
  neuron:[['Phase 1 · Depolarisation','Voltage-gated Na⁺ channels open at the axon hillock. The membrane flips from −70mV to +40mV in under 1 millisecond. 86 billion neurons, each capable of firing 1,000 times per second.'],['Phase 2 · Propagation','The action potential travels the axon via successive channel openings. Myelin speeds conduction to 120 m/s. A signal traverses your entire nervous system in 100 milliseconds.'],['Phase 3 · Synapse','Vesicles release neurotransmitters across the 20-nanometre synaptic cleft. Electrical to chemical to electrical again. Your every thought is this.']],
  immune:[['Phase 1 · TCR Scanning','Cytotoxic T-cells patrol continuously — 2 million new cells daily. They scan every cell they encounter, checking MHC-I complexes for mutant peptide antigens.'],['Phase 2 · Perforin Delivery','Recognition triggers perforin polymerisation into membrane pores. Granzyme B enters and activates caspase-3. The cancer cell has 10 minutes. The T-cell has already moved on.'],['Phase 3 · Apoptosis','The cancer cell dismantles itself from the inside. Macrophages arrive to clean debris. No inflammation. No bystander damage. Evolution\'s surgical precision.']],
  amr:[['Phase 1 · Healthy Colony','A single bacterium dividing every 20 minutes produces one billion descendants in 10 hours. Resistance genes may already exist at low frequency — present but invisible.'],['Phase 2 · Antibiotic Attack','The antibiotic kills 99.99% of the colony. This is a filter, not a cure. The 0.01% carrying resistance genes survive by luck, not planning. Natural selection compressed into days.'],['Phase 3 · Resistance','Within 48 hours the colony is reconstituted — entirely of resistant bacteria. The antibiotic selected for exactly what it was meant to kill.']],
  bh:[['Phase 1 · Accretion Disk','Extreme mass curves the spacetime metric. Matter spirals inward, heating to millions of Kelvin. The accretion disk emits X-rays visible across the galaxy.'],['Phase 2 · Photon Sphere','At 1.5 Schwarzschild radii, light itself orbits the singularity. Below this, no photon escapes. Above it, photons from behind the black hole bend around it.'],['Phase 3 · Einstein Ring','When a massive object precisely aligns between observer and background star, light bends completely around it — a perfect ring of magnified starlight. Predicted 1915. Photographed 2019.']],
  bigbang:[['Phase 1 · The Singularity','13.8 billion years ago, all matter, energy, space, and time existed in a volume smaller than a proton at 10³² Kelvin. Then — for no known reason — it expanded.'],['Phase 2 · Inflation','In 10⁻³² seconds the universe expanded by 10²⁶. Not matter moving through space — space itself stretching. Quantum fluctuations seeded the large-structure of everything that followed.'],['Phase 3 · First Light','380,000 years after the Big Bang the universe cooled enough for electrons to bind to protons. That light is still travelling — we see it as the Cosmic Microwave Background. The oldest light in existence.']],
  universe:[['Phase 1 · Our Planet','Begin here: Earth, 12,742 km across. Pale blue dot orbiting a medium-sized star, third of eight planets. Home to all known life in the universe.'],['Phase 2 · The Milky Way','200 billion suns in a disk 100,000 light-years across. Our solar system is 26,000 light-years from the galactic centre. We have never left our own star system.'],['Phase 3 · The Observable Universe','The Milky Way is one of at least 2 trillion galaxies in a sphere 93 billion light-years across. Beyond that, space continues but we cannot see it.']],
  rumour:[['Phase 1 · Initial Seeding','One person knows. In a network of 8 billion nodes, this person has 3 billion connections within three hops. The conditions for pandemic spread of information are always present.'],['Phase 2 · Network Cascade','Each spreader reaches susceptible neighbours. When R₀ exceeds 1.0 the cascade is exponential. One message, one billion minds — faster than any physical pathogen.'],['Phase 3 · Stifler Collapse','Saturation flips spreaders to stiflers. The cascade collapses not because truth wins, but because attention is finite. Information entropy always increases.']],
  urban:[['Phase 1 · Free Flow','Vehicles traverse the urban grid at optimal density. This state is unstable — small perturbations can tip it into a very different regime.'],['Phase 2 · Critical Threshold','Density exceeds the junction\'s service rate. The system undergoes a phase transition: from free-flow to congested. No stable intermediate state exists.'],['Phase 3 · Gridlock Cascade','Congestion percolates across connected streets. A bottleneck at one junction prevents vehicles leaving adjacent junctions. The entire network fails in a cascade.']],
  chem:[['Phase 1 · Reactant Diffusion','Reactant molecules A and B diffuse randomly through solution, governed by Brownian motion. No reaction can occur without a collision of sufficient energy.'],['Phase 2 · Collision Events','Molecules collide with kinetic energy exceeding the activation threshold. Bonds break and reform. Products appear at the reaction zone.'],['Phase 3 · Dynamic Equilibrium','Products accumulate as reactants deplete. The forward and reverse reaction rates equalise. The system finds its lowest-energy configuration.']]
};

/* ═══ WORD-BY-WORD STREAMING ═══ */
function streamWords(text){
  if(wordStreamTimer)clearInterval(wordStreamTimer);
  var el=document.getElementById('answerText');
  el.innerHTML='';
  var words=text.split(' ');
  var i=0;
  /* Create all word spans upfront */
  words.forEach(function(w){
    var span=document.createElement('span');
    span.className='word';
    span.textContent=w+' ';
    el.appendChild(span);
  });
  var spans=el.querySelectorAll('.word');
  wordStreamTimer=setInterval(function(){
    if(i<spans.length){spans[i].classList.add('show');i++;}
    else{clearInterval(wordStreamTimer);wordStreamTimer=null;}
  },85);
}

/* ═══ NARRATION ═══ */
function updateNarr(){
  var narrs=NARR[simDraw];if(!narrs)return;
  var ph=narrs[simPhase]||narrs[0];
  document.getElementById('narrPhase').textContent=ph[0];
  streamWords(ph[1]);
  /* Phase dots */
  var dots=document.getElementById('narrDots');dots.innerHTML='';
  for(var i=0;i<narrs.length;i++){
    var d=document.createElement('div');d.className='ndot'+(i===simPhase?' on':'');
    (function(idx){d.onclick=function(){setPhase(idx);};})(i);
    dots.appendChild(d);
  }
  if(voiceOn)speakCurrentNarr();
}

function nextPhase(){var narrs=NARR[simDraw];if(narrs&&simPhase<narrs.length-1)setPhase(simPhase+1);}
function setPhase(ph){simPhase=ph;simT=0;updateNarr();}

/* ═══ VOICE — ElevenLabs, auto-plays ═══ */
async function speakCurrentNarr(){
  if(!voiceOn)return;
  var narrs=NARR[simDraw];if(!narrs)return;
  var text=narrs[simPhase]&&narrs[simPhase][1];if(!text)return;
  if(voiceAudio){voiceAudio.pause();voiceAudio=null;}
  document.getElementById('voiceBadge').classList.add('show');
  try{
    var res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+ELEVEN_VOICE+'/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json','xi-api-key':ELEVEN_KEY},
      body:JSON.stringify({text:text,model_id:'eleven_turbo_v2',voice_settings:{stability:.42,similarity_boost:.82,speed:1.0}})
    });
    if(!res.ok)throw new Error('ElevenLabs '+res.status);
    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    voiceAudio=new Audio(url);
    voiceAudio.onended=function(){URL.revokeObjectURL(url);voiceAudio=null;document.getElementById('voiceBadge').classList.remove('show');};
    voiceAudio.onerror=function(){document.getElementById('voiceBadge').classList.remove('show');};
    voiceAudio.play();
  }catch(e){document.getElementById('voiceBadge').classList.remove('show');}
}

function toggleVoice(){
  voiceOn=!voiceOn;
  document.getElementById('voiceIco').textContent=voiceOn?'🔊':'🔇';
  document.getElementById('voiceBtn').classList.toggle('on',voiceOn);
  if(!voiceOn&&voiceAudio){voiceAudio.pause();voiceAudio=null;document.getElementById('voiceBadge').classList.remove('show');}
  else if(voiceOn)speakCurrentNarr();
}

/* ═══ PAUSE ═══ */
function togglePause(){
  paused=!paused;
  document.getElementById('pauseBtn').classList.toggle('on',paused);
  document.getElementById('pauseLabel').textContent=paused?'Play':'Pause';
  document.querySelector('#pauseBtn span:first-child').textContent=paused?'▶':'⏸';
}

/* ═══ MAIN LOOP ═══ */
function mainLoop(){
  requestAnimationFrame(mainLoop);
  if(!paused){
    simT+=simSpeed*16;
    var fn=customDrawFn||(DRAW[simDraw]||DRAW.heartbreak);
    fn(simT,simPhase);
  }
}

  {re:/neuron|brain|action potential|synap|nerve|myelin|thought|memory/i,key:'neuron'},
  {re:/cancer|tumor|t.cell|immune|immunolog|natural killer|lymph|perforin/i,key:'immune'},
  {re:/antibiotic|bacteria|amr|resistance.*drug|drug.*resist|penicillin|superbug/i,key:'amr'},
  {re:/black hole|event horizon|singularity|hawking|accretion|spacetime/i,key:'bh'},
  {re:/big bang|bigbang|universe.*begin|origin.*universe|inflation.*universe|cosmic.*microwave/i,key:'bigbang'},
  {re:/universe.*scale|cosmic.*zoom|how big|milky way|galaxy.*scale|observable universe/i,key:'universe'},
  {re:/rumour|rumor|gossip|misinform|fake news|viral.*spread|social.*spread/i,key:'rumour'},
  {re:/traffic|gridlock|congest|urban.*flow|transport.*system/i,key:'urban'},
  {re:/chem|react|molecule|atom|bond|enzyme|catalyst|acid|equilibrium/i,key:'chem'},
];
function smartRoute(q){for(var i=0;i<QMAP.length;i++)if(QMAP[i].re.test(q))return QMAP[i].key;return DOMAIN_ORDER[Math.floor(Math.random()*DOMAIN_ORDER.length)];}

/* ═══ ASK QUESTION ═══ */
async function askQuestion(){
  var q=(document.getElementById('mainQ').value||'').trim();if(!q)return;
  resetParticles();
  simT=0;simPhase=0;customDrawFn=null;
  var btn=document.getElementById('askBtn');btn.classList.add('busy');btn.textContent='…';
  document.getElementById('thinkOv').classList.add('show');
  var key=smartRoute(q);
  var pill=document.querySelector('.dpill[data-key="'+key+'"]');
  switchDomain(key,pill,true);
  /* Get enriched narration + written answer from Supabase Edge Function */
  try{
    var res=await fetch(SB_URL+'/functions/v1/simulate',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({question:q,domain:key})
    });
    var data=await res.json();
    if(data.narration&&Array.isArray(data.narration)&&data.narration.length===3){
      NARR[key]=data.narration;
    }
  }catch(e){/* keep existing narr */}
  updateNarr();
  document.getElementById('thinkOv').classList.remove('show');
  btn.classList.remove('busy');btn.textContent='Simulate ⚡';
  /* Reset likes for new sim */
  currentLikes=0;document.getElementById('likeCount').textContent='0';
  /* Save to Supabase */
  saveSimulation(q,key);
}

/* ═══ SAVE SIMULATION ═══ */
async function saveSimulation(q,domain){
  try{
    var r=await fetch(SB_URL+'/rest/v1/simulations',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
      body:JSON.stringify({title:q,domain:domain,is_public:true,likes:0})
    });
    var d=await r.json();
    if(d&&d[0])currentSimId=d[0].id;
  }catch(e){}
}

/* ═══ RIGHT RAIL ACTIONS ═══ */
async function doLike(){
  currentLikes++;
  var el=document.getElementById('likeCount');
  el.textContent=currentLikes;
  var btn=document.getElementById('railLike');
  btn.classList.add('liked');
  /* Pop animation */
  el.classList.add('popped');setTimeout(function(){el.classList.remove('popped');},400);
  /* Award point */
  earnPoint('❤️ +1 point for liking!');
  /* Update Supabase */
  if(currentSimId){
    fetch(SB_URL+'/rest/v1/simulations?id=eq.'+currentSimId,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
      body:JSON.stringify({likes:currentLikes})
    }).catch(function(){});
  }
}

function doShare(){
  var q=document.getElementById('mainQ').value||DOMAIN_LABELS[simDraw];
  var url='https://seenshown.com/?domain='+simDraw+'&q='+encodeURIComponent(q);
  if(navigator.share){
    navigator.share({title:'Watch this on SeenShown',text:'"'+q+'" — See it as a live particle simulation',url:url});
  } else {
    navigator.clipboard&&navigator.clipboard.writeText(url);
    showPtToast('🔗 Link copied!');
  }
  earnPoint('🔗 +2 points for sharing!',2);
}

function doVote(){
  currentVotes++;
  var el=document.getElementById('voteCount');
  el.textContent=currentVotes+' votes';
  el.classList.add('popped');setTimeout(function(){el.classList.remove('popped');},400);
  earnPoint('⭐ +5 points for voting!',5);
}

function doEarn(){
  showPtToast('💰 '+userPoints+' points = $'+(userPoints*0.01).toFixed(2)+' earned · Redeem at 1000 pts');
}

function earnPoint(msg,pts){
  userPoints+=(pts||1);
  document.getElementById('pointsCount').textContent=userPoints+' pts';
  showPtToast(msg);
}

function showPtToast(msg){
  var t=document.getElementById('ptToast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

/* ═══ COMPETITION MODE ═══ */
var compCtx1,compCtx2,compDraw1='heartbreak',compDraw2='love',compT=0,compTimeLeft=60;

function startCompete(){
  if(compActive)return;
  compActive=true;
  compScoreA=0;compScoreB=0;compTimeLeft=60;
  document.getElementById('scoreA').textContent='Top: 0 votes';
  document.getElementById('scoreB').textContent='Bottom: 0 votes';
  document.getElementById('compTimer').textContent='⏱ 60s';
  document.getElementById('compMode').classList.add('active');
  /* Set up canvases */
  var c1=document.getElementById('compCanvas1');
  var c2=document.getElementById('compCanvas2');
  c1.width=window.innerWidth;c2.width=window.innerWidth;
  c1.height=(window.innerHeight-3)/2;c2.height=(window.innerHeight-3)/2;
  compCtx1=c1.getContext('2d');compCtx2=c2.getContext('2d');
  /* Pick two different domains */
  compDraw1=simDraw;
  var others=DOMAIN_ORDER.filter(function(d){return d!==simDraw;});
  compDraw2=others[Math.floor(Math.random()*others.length)];
  /* Timer */
  compTimer=setInterval(function(){
    compTimeLeft--;
    document.getElementById('compTimer').textContent='⏱ '+compTimeLeft+'s';
    if(compTimeLeft<=0)endCompete();
  },1000);
  /* Animate */
  (function compLoop(){
    if(!compActive)return;
    requestAnimationFrame(compLoop);
    compT+=simSpeed*16;
    /* Draw into comp canvases using temp ctx swap */
    var savedCtx=ctx,savedCanvas=canvas;
    ctx=compCtx1;canvas=c1;W=function(){return c1.width};H=function(){return c1.height};
    (DRAW[compDraw1]||DRAW.heartbreak)(compT,simPhase);
    ctx=compCtx2;canvas=c2;W=function(){return c2.width};H=function(){return c2.height};
    (DRAW[compDraw2]||DRAW.love)(compT,0);
    ctx=savedCtx;canvas=savedCanvas;W=function(){return canvas.width};H=function(){return canvas.height};
  })();
  document.getElementById('voteA').textContent='👆 Vote: '+DOMAIN_LABELS[compDraw1];
  document.getElementById('voteB').textContent='👆 Vote: '+DOMAIN_LABELS[compDraw2];
}

function castVote(side){
  if(side==='A'){compScoreA++;document.getElementById('scoreA').textContent='Top: '+compScoreA+' votes';}
  else{compScoreB++;document.getElementById('scoreB').textContent='Bottom: '+compScoreB+' votes';}
  earnPoint('⚔️ +3 points for voting!',3);
}

function endCompete(){
  compActive=false;
  if(compTimer)clearInterval(compTimer);
  document.getElementById('compMode').classList.remove('active');
  var winner=compScoreA>=compScoreB?DOMAIN_LABELS[compDraw1]:DOMAIN_LABELS[compDraw2];
  showPtToast('🏆 '+winner+' wins! You earned points.');
}

/* ═══ DOMAIN SWITCH ═══ */
var domIdx=DOMAIN_ORDER.indexOf(simDraw);
function resetParticles(){window._rP=null;window._cP=null;window._cars=null;window._hbP=null;window._lvP=null;window._grP=null;window._angP=null;window._jyP=null;window._bbP=null;window._bbStars=null;window._uvStars0=null;window._uvMW=null;window._uvCW=null;}

function switchDomain(key,pill,silent){
  simDraw=key;if(!silent){simPhase=0;simT=0;}customDrawFn=null;
  resetParticles();
  if(voiceAudio){voiceAudio.pause();voiceAudio=null;document.getElementById('voiceBadge').classList.remove('show');}
  document.querySelectorAll('.dpill').forEach(function(p){p.classList.remove('active');p.style.background='rgba(2,4,14,.65)';p.style.color='var(--dim)';});
  if(pill){pill.classList.add('active');pill.style.background=DC[key]||'#26e8b0';pill.style.color='#02040e';}
  domIdx=DOMAIN_ORDER.indexOf(key);
  if(!silent){updateNarr();}
}

/* ═══ UI BUILD ═══ */
function buildStrip(){
  var strip=document.getElementById('pills');strip.innerHTML='';
  DOMAIN_ORDER.forEach(function(key){
    var el=document.createElement('div');el.className='dpill';
    el.textContent=DOMAIN_LABELS[key]||key;el.dataset.key=key;
    el.onclick=function(){switchDomain(key,el);};
    if(key===simDraw){el.classList.add('active');el.style.background=DC[key]||'#26e8b0';el.style.color='#02040e';}
    strip.appendChild(el);
  });
}

var DEFAULT_QS=['How does heartbreak feel?','How does grief form?','What is the Big Bang?','How big is the universe?','How does a neuron fire?','How do T-cells kill cancer?','How does antibiotic resistance happen?','How does a black hole form?','How does anger work?','What is joy?','How does love work?','How do rumours spread?','How does gridlock happen?','What is a chemical reaction?'];
function buildChips(){var c=document.getElementById('qchips');DEFAULT_QS.forEach(function(q){var ch=document.createElement('span');ch.className='qchip';ch.textContent=q;ch.onclick=function(){document.getElementById('mainQ').value=q;autoResize(document.getElementById('mainQ'));askQuestion();};c.appendChild(ch);});}

document.getElementById('speedR').oninput=function(){simSpeed=parseFloat(this.value);};

/* ═══ GESTURES ═══ */
var tY=0,tX=0,swipeUsed=false;
document.addEventListener('touchstart',function(e){if(e.target.closest('#bottomPanel')||e.target.closest('#rightRail')||e.target.closest('#pills')||e.target.closest('#nav'))return;tY=e.touches[0].clientY;tX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  if(e.target.closest('#bottomPanel')||e.target.closest('#rightRail')||e.target.closest('#pills')||e.target.closest('#nav'))return;
  var dy=tY-e.changedTouches[0].clientY,dx=tX-e.changedTouches[0].clientX;
  if(!swipeUsed){swipeUsed=true;document.getElementById('swipeHint').classList.add('hide');}
  if(Math.abs(dy)>55&&Math.abs(dy)>Math.abs(dx)){
    domIdx=(domIdx+(dy>0?1:-1)+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;
    var nd=DOMAIN_ORDER[domIdx];
    var mp=document.querySelector('.dpill[data-key="'+nd+'"]');
    switchDomain(nd,mp);
  } else if(Math.abs(dy)<14&&Math.abs(dx)<14){
    var r=document.createElement('div');r.className='rpl';r.style.left=e.changedTouches[0].clientX+'px';r.style.top=e.changedTouches[0].clientY+'px';document.body.appendChild(r);setTimeout(function(){r.remove();},650);
    nextPhase();
  }
},{passive:true});

var mD=false,mY=0;
canvas.addEventListener('mousedown',function(e){mD=true;mY=e.clientY;});
canvas.addEventListener('mouseup',function(e){
  if(!mD)return;mD=false;var dy=mY-e.clientY;
  if(Math.abs(dy)>70){domIdx=(domIdx+(dy>0?1:-1)+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;var nd=DOMAIN_ORDER[domIdx];var mp=document.querySelector('.dpill[data-key="'+nd+'"]');switchDomain(nd,mp);}
  else if(Math.abs(dy)<10){var r=document.createElement('div');r.className='rpl';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';document.body.appendChild(r);setTimeout(function(){r.remove();},650);nextPhase();}
});

document.addEventListener('keydown',function(e){
  var nd,mp;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();domIdx=(domIdx+1)%DOMAIN_ORDER.length;nd=DOMAIN_ORDER[domIdx];mp=document.querySelector('.dpill[data-key="'+nd+'"]');switchDomain(nd,mp);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();domIdx=(domIdx-1+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;nd=DOMAIN_ORDER[domIdx];mp=document.querySelector('.dpill[data-key="'+nd+'"]');switchDomain(nd,mp);}
  if(e.key===' '){var ae=document.activeElement;var inInput=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');if(!inInput){e.preventDefault();togglePause();}}
  if(e.key==='1')setPhase(0);if(e.key==='2')setPhase(1);if(e.key==='3')setPhase(2);
  if(e.key==='v'||e.key==='V')toggleVoice();
  if(e.key==='Enter'&&document.activeElement!==document.getElementById('mainQ'))askQuestion();
});

/* ═══ URL PARAMS ═══ */
var urlParams=new URLSearchParams(window.location.search);
var urlDomain=urlParams.get('domain');
var urlQ=urlParams.get('q');
if(urlDomain&&DOMAIN_ORDER.includes(urlDomain))simDraw=urlDomain;

/* ═══ BOOT ═══ */
function boot(){
  LOD=0;(DRAW[simDraw]||DRAW.heartbreak)(0,0);
  document.getElementById('lodOv').classList.add('gone');
  mainLoop();
  setTimeout(function(){LOD=1;},300);
  setTimeout(function(){LOD=2;},800);
  updateNarr();buildStrip();buildChips();
  /* Auto-voice starts with the sim */
  setTimeout(function(){if(voiceOn)speakCurrentNarr();},1000);
  /* Handle URL question */
  if(urlQ){document.getElementById('mainQ').value=urlQ;autoResize(document.getElementById('mainQ'));setTimeout(askQuestion,600);}
}
boot();
</script>
