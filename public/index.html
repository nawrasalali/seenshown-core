<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SeenShown — Watch Any Question Come Alive</title>
<meta name="description" content="Type any question. Watch it become a real-time particle simulation.">
<meta name="theme-color" content="#02040e">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#02040e;--g:#26e8b0;--p:#7C4FD4;--w:#e8eaf0;--dim:#6b7280;--border:rgba(38,232,176,0.15);--red:#e05c5c;--gold:#f0c040}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--w);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* CANVAS */
#simCanvas{position:fixed;inset:0;width:100%;height:100%;display:block}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:48px;background:rgba(2,4,14,0.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-logo{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;color:var(--g);text-decoration:none}
.nav-tabs{display:flex;gap:1px}
.ntab{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:500;color:var(--dim);cursor:pointer;transition:all .18s;border:none;background:transparent;text-decoration:none;display:inline-block}
.ntab.active{color:var(--g);background:rgba(38,232,176,0.08)}
.nav-right{display:flex;align-items:center;gap:6px}
.nbadge{font-size:.55rem;background:rgba(124,79,212,0.18);border:1px solid rgba(124,79,212,0.4);color:#c4a0ff;padding:2px 6px;border-radius:12px}
.inv-btn{font-size:.65rem;background:var(--g);color:#02040e;padding:4px 9px;border-radius:6px;font-weight:700;text-decoration:none;display:inline-block}

/* DOMAIN PILLS */
#pills{position:fixed;top:48px;left:0;right:60px;z-index:100;display:flex;gap:4px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(180deg,rgba(2,4,14,0.88) 0%,transparent 100%)}
#pills::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:14px;border:1px solid rgba(255,255,255,0.09);color:var(--dim);cursor:pointer;transition:all .2s;background:rgba(2,4,14,0.65);white-space:nowrap}
.dpill.active{color:#02040e;font-weight:700}

/* RIGHT RAIL */
#rightRail{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:150;display:flex;flex-direction:column;align-items:center;gap:20px;padding:16px 10px}
.rail-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .2s}
.rail-icon{width:44px;height:44px;border-radius:50%;background:rgba(2,4,14,0.75);border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;backdrop-filter:blur(8px)}
.rail-btn:hover .rail-icon{border-color:var(--g);background:rgba(38,232,176,0.12)}
.rail-btn.liked .rail-icon{border-color:var(--red);background:rgba(224,92,92,0.15)}
.rail-label{font-size:.58rem;color:var(--dim);font-weight:600;text-align:center}
.rail-label.red{color:var(--red)}
.rail-label.gold{color:var(--gold)}
.rail-label.green{color:var(--g)}

/* BOTTOM PANEL */
#bottomPanel{position:fixed;bottom:0;left:0;right:0;z-index:150;pointer-events:none}
#answerWrap{pointer-events:all;padding:0 16px 10px;background:linear-gradient(0deg,rgba(2,4,14,0.97) 0%,rgba(2,4,14,0.7) 70%,transparent 100%)}
#narrPhase{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--g);opacity:.7;margin-bottom:4px}
#narrDots{display:flex;gap:5px;margin-bottom:7px}
.ndot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:all .18s}
.ndot.on{background:var(--g);width:14px;border-radius:3px}
#answerText{font-size:.88rem;line-height:1.68;color:rgba(255,255,255,0.88);max-width:680px;min-height:44px;letter-spacing:.01em}
.word{display:inline;opacity:0;transition:opacity .18s}
.word.show{opacity:1}

/* CONTROLS */
#iconRow{pointer-events:all;display:flex;align-items:center;gap:7px;padding:8px 14px 0;flex-wrap:wrap}
.ictl{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;font-size:.7rem;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .18s;white-space:nowrap}
.ictl:hover{border-color:rgba(38,232,176,0.35);color:var(--g)}
.ictl.on{border-color:var(--g);color:var(--g);background:rgba(38,232,176,0.07)}
.sdiv{width:1px;height:16px;background:rgba(255,255,255,0.07)}
#speedR{width:72px;accent-color:var(--g);cursor:pointer}
.chips{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;font-size:.6rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:4px 8px;color:var(--dim);cursor:pointer;transition:all .17s;white-space:nowrap}
.qchip:hover{border-color:var(--g);color:var(--g)}

/* INPUT */
#qRow{pointer-events:all;display:flex;gap:8px;padding:10px 14px 14px;background:rgba(2,4,14,0.97);border-top:1px solid rgba(255,255,255,0.05)}
#mainQ{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--w);font-size:.92rem;outline:none;transition:border-color .2s;caret-color:var(--g);resize:none;min-height:46px;max-height:90px;font-family:inherit;line-height:1.4}
#mainQ:focus{border-color:var(--g);background:rgba(255,255,255,0.09)}
#mainQ::placeholder{color:var(--dim)}
#askBtn{background:var(--g);color:#02040e;border:none;border-radius:12px;padding:12px 14px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;min-width:80px;transition:opacity .2s;align-self:flex-end}
#askBtn:hover{opacity:.88}
#askBtn.busy{opacity:.45;pointer-events:none}

/* VOICE */
#voiceBadge{position:fixed;top:56px;left:14px;background:rgba(124,79,212,0.12);border:1px solid rgba(124,79,212,0.3);border-radius:8px;padding:4px 10px;font-size:.66rem;color:#c4a0ff;opacity:0;transition:opacity .3s;z-index:160;display:flex;align-items:center;gap:5px;pointer-events:none}
#voiceBadge.show{opacity:1}
.vwave{display:flex;gap:2px;align-items:center;height:12px}
.vwave span{display:block;width:2px;background:#c4a0ff;border-radius:2px;animation:vw .6s ease-in-out infinite}
.vwave span:nth-child(1){animation-delay:0s;height:3px}
.vwave span:nth-child(2){animation-delay:.15s;height:9px}
.vwave span:nth-child(3){animation-delay:.3s;height:6px}
.vwave span:nth-child(4){animation-delay:.15s;height:11px}
.vwave span:nth-child(5){animation-delay:0s;height:3px}
@keyframes vw{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

/* LOAD */
#lodOv{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .5s;z-index:300}
#lodOv.gone{opacity:0;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.lring{width:36px;height:36px;border:2px solid rgba(38,232,176,0.12);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
.ltxt{font-size:.68rem;color:var(--dim)}

/* POINTS TOAST */
#ptToast{position:fixed;top:30%;left:50%;transform:translateX(-50%);background:rgba(240,192,64,0.18);border:1px solid rgba(240,192,64,0.5);border-radius:20px;padding:8px 18px;font-size:.8rem;font-weight:700;color:var(--gold);opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;backdrop-filter:blur(8px)}
#ptToast.show{opacity:1}

/* SWIPE HINT */
#swipeHint{position:fixed;right:62px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;opacity:.35;transition:opacity .5s;z-index:50}
#swipeHint.hide{opacity:0}
.sa{font-size:1rem;color:var(--g);animation:bup 1.6s ease-in-out infinite}
@keyframes bup{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* COMPETE */
#compMode{position:fixed;inset:0;z-index:170;display:none;flex-direction:column}
#compMode.active{display:flex}
#compCanvas1,#compCanvas2{flex:1;display:block;width:100%}
#compDivider{height:3px;background:linear-gradient(90deg,var(--p),var(--g));position:relative;flex-shrink:0}
#compDivider::after{content:'VS';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);padding:2px 10px;border:1px solid var(--border);border-radius:8px;font-size:.65rem;font-weight:800;color:var(--g)}
#compVoteTop{position:fixed;bottom:50%;margin-bottom:10px;left:0;right:0;z-index:175;display:flex;padding:0 20px}
#compVoteBot{position:fixed;top:50%;margin-top:10px;left:0;right:0;z-index:175;display:flex;padding:0 20px}
.comp-vote-btn{flex:1;padding:11px;border:none;border-radius:10px;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(12px)}
#voteA{background:rgba(124,79,212,0.22);color:#c4a0ff;border:1px solid rgba(124,79,212,0.35)}
#voteB{background:rgba(38,232,176,0.12);color:var(--g);border:1px solid rgba(38,232,176,0.28)}
#compScores{position:fixed;top:55px;left:0;right:0;z-index:175;display:flex;justify-content:space-between;padding:6px 16px;font-size:.7rem;font-weight:700}
#scoreA{color:#c4a0ff}
#scoreB{color:var(--g)}
#compTimer{position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:175;background:rgba(2,4,14,0.85);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.72rem;color:var(--w);font-weight:700}
#closeComp{position:fixed;top:55px;right:14px;z-index:176;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 10px;font-size:.7rem;color:var(--dim);cursor:pointer}

/* RIPPLE */
.rpl{position:fixed;border-radius:50%;border:2px solid var(--g);animation:rplAnim .6s ease-out forwards;pointer-events:none;z-index:100}
@keyframes rplAnim{0%{width:8px;height:8px;opacity:.85;margin:-4px}100%{width:70px;height:70px;opacity:0;margin:-35px}}

@media(max-width:640px){.ntab:not(.active){display:none}.rail-icon{width:40px;height:40px;font-size:1.05rem}}
</style>
</head>

<div id="lodOv"><div style="text-align:center"><div class="lring"></div><div class="ltxt">Initialising particle engine…</div></div></div>

<div id="ptToast"></div>

  <div id="compVoteBot"><button class="comp-vote-btn" id="voteB" onclick="castVote('B')">👆 Vote this sim</button></div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   SEENSHOWN v6 — FORMATION ENGINE
   
   Dr. Sina's architecture:
   - Particles start at birth position (random / centre / edge)
   - Each particle has a TARGET position derived from the sim spec
   - Particles travel to target over formation time (eased)
   - Once formed, gentle noise keeps them alive (breathing)
   - Phase transitions move particles to new targets
   - Shapes: face, explosion, spiral, fracture, void, orbit, wave
═══════════════════════════════════════════════════════ */

var SB_URL='https://jnvdpmmxlbkxwanqqhfw.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudmRwbW14bGJreHdhbnFxaGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Nzc2MzgsImV4cCI6MjA5MTA1MzYzOH0.QBD3_YiDvJXvO12gE6FR1GthUd1SvC0MmOmVoPaU71M';
var ELEVEN_KEY='sk_a0c7de82c7a1a0e85ca0e62d5f69e7c5fcf3d0e1ac84fba8';
var ELEVEN_VOICE='JBFqnCBsd6RMkjVDRZzb';

var canvas=document.getElementById('simCanvas');
var ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',function(){resize();rebuildSim();});

var W=function(){return canvas.width;};
var H=function(){return canvas.height;};

/* ── State ── */
var paused=false,voiceOn=true,voiceAudio=null;
var userPoints=0,currentLikes=0,currentVotes=0,currentSimId=null;
var wordStreamTimer=null;
var simPhase=0,simDomain='heartbreak';
var currentQuestion='';
var compActive=false,compTimer=null,compScoreA=0,compScoreB=0,compTimeLeft=60;

/* ── Density slider controls particle count multiplier ── */
var DENSITY=0.5;
document.getElementById('speedR').oninput=function(){
  DENSITY=parseFloat(this.value);
  rebuildSim();
};

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}

/* ════════════════════════════════════════════════
   PARTICLE FORMATION ENGINE
   
   Each particle has:
   - x, y      : current position
   - tx, ty    : target position (the shape)
   - bx, by    : birth position (where it starts)
   - r, g, b   : colour
   - alpha     : opacity
   - size      : radius
   - formed    : 0→1 progress to target
   - speed     : individual formation speed
   - noise     : breathing amplitude
   - noff      : noise offset (unique per particle)
════════════════════════════════════════════════ */

var particles=[];
var RAF=null;
var simT=0;
var currentSpec=null;

/* Easing */
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}

/* ── SHAPE GENERATORS — return array of {x,y,r,g,b,size} ── */
var SHAPES={};

/* SINGULARITY: all particles at centre, tiny */
SHAPES.singularity=function(n,cx,cy){
  var pts=[];
  for(var i=0;i<n;i++){
    pts.push({x:cx+(Math.random()-.5)*4,y:cy+(Math.random()-.5)*4,r:255,g:255,b:255,size:.5+Math.random()*.5});
  }
  return pts;
};

/* EXPLOSION: radial burst from centre */
SHAPES.explosion=function(n,cx,cy,maxR){
  var pts=[];
  maxR=maxR||(Math.min(W(),H())*.48);
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2;
    var d=Math.pow(Math.random(),.4)*maxR;
    var t=d/maxR;
    /* Hot centre: white→yellow→orange→purple at edges */
    var rr=Math.round(255);
    var gg=Math.round(255*(1-t*.6));
    var bb=Math.round(t<.5?200*(1-t*2):t>0.7?150*((t-.7)/.3):0);
    pts.push({x:cx+Math.cos(ang)*d,y:cy+Math.sin(ang)*d,r:rr,g:gg,b:bb,size:Math.max(.5,2.5*(1-t*.7))});
  }
  return pts;
};

/* SPIRAL GALAXY: 3-arm logarithmic spiral */
SHAPES.spiral=function(n,cx,cy){
  var pts=[];
  var maxR=Math.min(W(),H())*.44;
  for(var i=0;i<n;i++){
    var arm=i%3;
    var t=Math.pow(Math.random(),.5);
    var r=t*maxR;
    var baseAng=arm*Math.PI*2/3+t*4+Math.random()*.5;
    var hue=arm===0?[180,200,255]:arm===1?[255,230,180]:[255,160,80];
    pts.push({x:cx+Math.cos(baseAng)*r,y:cy+Math.sin(baseAng)*r*.52,r:hue[0],g:hue[1],b:hue[2],size:Math.max(.4,1.8*(1-t*.6))});
  }
  return pts;
};

/* FACE — emoji-derived pixel map */
SHAPES.face=function(n,cx,cy,emoji,tint){
  /* Render emoji to offscreen canvas, extract lit pixels */
  var sz=Math.round(Math.min(W(),H())*.52);
  var oc=document.createElement('canvas');oc.width=sz;oc.height=sz;
  var oc2=oc.getContext('2d');
  oc2.fillStyle='#000';oc2.fillRect(0,0,sz,sz);
  oc2.font=Math.round(sz*.78)+'px serif';
  oc2.textAlign='center';oc2.textBaseline='middle';
  oc2.fillText(emoji||'😢',sz/2,sz/2);
  var data=oc2.getImageData(0,0,sz,sz).data;
  /* Collect bright pixels */
  var pool=[];
  var step=Math.max(1,Math.round(sz/80));
  for(var py=0;py<sz;py+=step){
    for(var px=0;px<sz;px+=step){
      var idx=(py*sz+px)*4;
      var bright=(data[idx]+data[idx+1]+data[idx+2])/3;
      if(bright>30)pool.push({px:px,py:py,bright:bright,r:data[idx],g:data[idx+1],b:data[idx+2]});
    }
  }
  if(pool.length===0)return SHAPES.orbit(n,cx,cy);
  var pts=[];
  var offX=cx-sz/2,offY=cy-sz/2;
  for(var i=0;i<n;i++){
    var src=pool[Math.floor(Math.random()*pool.length)];
    var jx=(Math.random()-.5)*step*1.2,jy=(Math.random()-.5)*step*1.2;
    var rr=tint?Math.round(tint[0]*.6+src.r*.4):src.r;
    var gg=tint?Math.round(tint[1]*.6+src.g*.4):src.g;
    var bb=tint?Math.round(tint[2]*.6+src.b*.4):src.b;
    pts.push({x:offX+src.px+jx,y:offY+src.py+jy,r:rr,g:gg,b:bb,size:.8+Math.random()*1.2});
  }
  return pts;
};

/* ORBIT: two orbiting rings */
SHAPES.orbit=function(n,cx,cy){
  var pts=[];
  var r1=Math.min(W(),H())*.18,r2=Math.min(W(),H())*.28;
  for(var i=0;i<n;i++){
    var ring=i<n/2?0:1;
    var ang=Math.random()*Math.PI*2;
    var r=ring===0?r1:r2;
    var spread=r*.08;
    pts.push({
      x:cx+Math.cos(ang)*(r+(Math.random()-.5)*spread),
      y:cy+Math.sin(ang)*(r+(Math.random()-.5)*spread)*.72,

/* TWO FIELDS: two separate clusters */
SHAPES.twoFields=function(n,cx,cy,col1,col2){
  var pts=[];
  var r=Math.min(W(),H())*.22;
  for(var i=0;i<n;i++){
    var side=i<n/2?-1:1;
    var ang=Math.random()*Math.PI*2;
    var d=Math.random()*r;
    var c=side===-1?(col1||[220,100,130]):(col2||[200,140,80]);
    pts.push({x:cx+side*r*.9+Math.cos(ang)*d*.7,y:cy+Math.sin(ang)*d*.55,r:c[0],g:c[1],b:c[2],size:1.2+Math.random()*2.4});
  }
  return pts;
};

/* VOID CENTRE: ring with dark hole */
SHAPES.voidCentre=function(n,cx,cy){
  var pts=[];
  var minR=Math.min(W(),H())*.12,maxR=Math.min(W(),H())*.45;
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2;
    var d=minR+Math.pow(Math.random(),.6)*(maxR-minR);
    var t=(d-minR)/(maxR-minR);
    pts.push({x:cx+Math.cos(ang)*d,y:cy+Math.sin(ang)*d*.72,r:Math.round(60+t*60),g:Math.round(80+t*80),b:Math.round(150+t*60),size:.8+Math.random()*2.2});
  }
  return pts;
};

/* FRACTURE: two halves separating */
SHAPES.fracture=function(n,cx,cy,sep){
  var pts=[];
  sep=sep||0;
  var r=Math.min(W(),H())*.22;
  for(var i=0;i<n;i++){
    var side=i<n/2?-1:1;
    var ang=Math.random()*Math.PI*2;
    var d=Math.random()*r;
    var cold=sep>0.3;
    pts.push({
      x:cx+side*(r*.8+sep*W()*.18)+Math.cos(ang)*d*.7,
      y:cy+Math.sin(ang)*d*.55,
      r:cold?(side===-1?40:60):(side===-1?220:200),
      g:cold?(side===-1?60:50):(side===-1?100:140),
      b:cold?(side===-1?180:150):(side===-1?130:80),

    });
  }
  return pts;
};

/* NEURAL NETWORK: nodes + connections implied by particle clusters */
SHAPES.neural=function(n,cx,cy){

  for(var i=0;i<nNodes;i++){

  }
  for(var i=0;i<n;i++){

    var spread=Math.min(W(),H())*.04;
    pts.push({x:node.x+(Math.random()-.5)*spread,y:node.y+(Math.random()-.5)*spread,r:60,g:160,b:255,size:.8+Math.random()*2});

/* WAVE: sine wave made of particles */
SHAPES.wave=function(n,cx,cy){
  var pts=[];
  var amp=Math.min(W(),H())*.18;
  for(var i=0;i<n;i++){
    var x=Math.random()*W();
    var layers=Math.floor(Math.random()*3);
    var freq=1+layers*.5;
    var y=cy+Math.sin((x/W())*Math.PI*2*freq)*amp*(1-layers*.25)+(Math.random()-.5)*20;
    var t=Math.abs(y-cy)/amp;
    pts.push({x:x,y:y,r:Math.round(38+t*80),g:Math.round(232-t*80),b:Math.round(176+t*60),size:.6+Math.random()*1.8});
  }
  return pts;
};

};

/* ════ FORMATION ENGINE ════ */
var bgColor='#02040e';

function buildParticles(spec,phaseIdx){
  var phase=spec.phases[phaseIdx];
  if(!phase)return;
  var n=spec.particleCount();
  var targets=phase.shape(n);
  bgColor=phase.bg||'#02040e';

  if(particles.length===0){
    /* First build — create particles at random birth positions */
    for(var i=0;i<n;i++){
      var tgt=targets[i]||targets[i%targets.length];
      particles.push({
        x:Math.random()*W(),y:Math.random()*H(),
        tx:tgt.x,ty:tgt.y,
        r:tgt.r,g:tgt.g,b:tgt.b,
        alpha:0,
        size:tgt.size||1,
        formed:0,
        speed:.003+Math.random()*.008,
        noise:2+Math.random()*3,
        noff:Math.random()*1000,
        birthDelay:Math.random()*.6
      });
    }
  } else {
    /* Subsequent phases — move existing particles to new targets */
    var len=Math.min(particles.length,n);
    for(var i=0;i<len;i++){
      var tgt=targets[i]||targets[i%targets.length];
      var p=particles[i];
      p.tx=tgt.x;p.ty=tgt.y;
      p.r=tgt.r;p.g=tgt.g;p.b=tgt.b;
      p.size=tgt.size||1;
      p.formed=0;
      p.speed=.003+Math.random()*.008;
      p.birthDelay=Math.random()*.3;
    }
  }
}

function tickParticles(dt){
  var t=simT*.001;
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.birthDelay>0){p.birthDelay-=dt*.001;continue;}
    /* Move toward target */
    if(p.formed<1){
      p.formed=Math.min(1,p.formed+p.speed*(dt*.016));
      var ef=easeOut(p.formed);
      p.x+=(p.tx-p.x)*ef*.06;
      p.y+=(p.ty-p.y)*ef*.06;
      p.alpha=Math.min(1,p.formed*2);
    } else {
      /* Alive — gentle noise breathing */
      var nx=Math.sin(t*.7+p.noff)*p.noise;
      var ny=Math.cos(t*.5+p.noff*1.3)*p.noise;
      p.x=p.tx+nx;
      p.y=p.ty+ny;
      p.alpha=1;
    }
  }
}

function renderParticles(){
  ctx.fillStyle=bgColor;
  ctx.fillRect(0,0,W(),H());
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.alpha<0.02)continue;
    ctx.globalAlpha=p.alpha*.88;
    ctx.fillStyle='rgb('+p.r+','+p.g+','+p.b+')';
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

}

  setPhase(0);

function buildCompParticles(spec,phaseIdx,cw,ch){
  var n=Math.round(spec.particleCount()*.25);
  var phase=spec.phases[phaseIdx];
  /* Temporarily override W/H for shape generation */
  var oldW=W,oldH=H;
  W=function(){return cw;};H=function(){return ch;};
  var targets=phase.shape(n);
  W=oldW;H=oldH;
  var pts=[];
  for(var i=0;i<n;i++){
    var t=targets[i]||targets[i%targets.length];
    pts.push({x:Math.random()*cw,y:Math.random()*ch,tx:t.x,ty:t.y,r:t.r,g:t.g,b:t.b,size:t.size||1,formed:0,speed:.004+Math.random()*.008,noise:1.5+Math.random()*2.5,noff:Math.random()*1000,alpha:0});
  }
  return pts;
}

var compT=0;
function tickCompParticles(pts,cw,ch){
  compT+=0.016;
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    if(p.formed<1){p.formed=Math.min(1,p.formed+p.speed);var ef=easeOut(p.formed);p.x+=(p.tx-p.x)*ef*.06;p.y+=(p.ty-p.y)*ef*.06;p.alpha=Math.min(1,p.formed*2);}
    else{p.x=p.tx+Math.sin(compT*.7+p.noff)*p.noise;p.y=p.ty+Math.cos(compT*.5+p.noff*1.3)*p.noise;p.alpha=1;}
  }
}

function renderCompParticles(c2,pts,cw,ch,bg){
  c2.fillStyle=bg||'#02040e';c2.fillRect(0,0,cw,ch);
  for(var i=0;i<pts.length;i++){
    var p=pts[i];if(p.alpha<0.02)continue;
    c2.globalAlpha=p.alpha*.88;c2.fillStyle='rgb('+p.r+','+p.g+','+p.b+')';
    c2.beginPath();c2.arc(p.x,p.y,p.size,0,Math.PI*2);c2.fill();
  }
  c2.globalAlpha=1;
}

    switchDomain(nd,mp);
  }
},{passive:true});

var mD=false,mY=0;
canvas.addEventListener('mousedown',function(e){mD=true;mY=e.clientY;});
canvas.addEventListener('mouseup',function(e){
  if(!mD)return;mD=false;var dy=mY-e.clientY;
  if(Math.abs(dy)>70){domIdx=(domIdx+(dy>0?1:-1)+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;var nd=DOMAIN_ORDER[domIdx];var mp=document.querySelector('.dpill[data-key="'+nd+'"]');switchDomain(nd,mp);}
  else if(Math.abs(dy)<10){nextPhase();}
});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();domIdx=(domIdx+1)%DOMAIN_ORDER.length;switchDomain(DOMAIN_ORDER[domIdx],document.querySelector('.dpill[data-key="'+DOMAIN_ORDER[domIdx]+'"]'));}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();domIdx=(domIdx-1+DOMAIN_ORDER.length)%DOMAIN_ORDER.length;switchDomain(DOMAIN_ORDER[domIdx],document.querySelector('.dpill[data-key="'+DOMAIN_ORDER[domIdx]+'"]'));}
  if(e.key===' '){var ae=document.activeElement;if(ae&&ae.tagName!=='INPUT'&&ae.tagName!=='TEXTAREA'){e.preventDefault();togglePause();}}
  if(e.key==='1')setPhase(0);if(e.key==='2')setPhase(1);if(e.key==='3')setPhase(2);
  if(e.key==='v'||e.key==='V')toggleVoice();
});

/* ════ UI ════ */
function buildStrip(){
  var strip=document.getElementById('pills');strip.innerHTML='';
  DOMAIN_ORDER.forEach(function(key){
    var el=document.createElement('div');el.className='dpill';
    el.textContent=DOMAIN_LABELS[key];el.dataset.key=key;
    el.onclick=function(){switchDomain(key,el);};
    if(key===simDomain){el.classList.add('active');el.style.background=DC[key];el.style.color='#02040e';}
    strip.appendChild(el);
  });
}

var DEFAULT_QS=['How does heartbreak feel?','What happens when we fall in love?','How does grief work?','What is the Big Bang?','How does a black hole form?','How does a neuron fire?','How do T-cells kill cancer?','How does antibiotic resistance happen?','How does anger work?','What is joy?','How do rumours spread?','How does traffic gridlock happen?','How big is the universe?','What is a chemical reaction?'];
function buildChips(){
  var c=document.getElementById('qchips');
  DEFAULT_QS.forEach(function(q){
    var ch=document.createElement('span');ch.className='qchip';ch.textContent=q;
    ch.onclick=function(){document.getElementById('mainQ').value=q;autoResize(document.getElementById('mainQ'));askQuestion();};
    c.appendChild(ch);
  });
}

/* ════ BOOT ════ */
var urlParams=new URLSearchParams(window.location.search);
var urlDomain=urlParams.get('domain');
var urlQ=urlParams.get('q');
if(urlDomain&&DOMAIN_ORDER.includes(urlDomain))simDomain=urlDomain;

function boot(){
  buildStrip();buildChips();
  setPhase(0);
  document.getElementById('lodOv').classList.add('gone');
  requestAnimationFrame(mainLoop);
  if(urlQ){document.getElementById('mainQ').value=urlQ;autoResize(document.getElementById('mainQ'));setTimeout(askQuestion,800);}
}
boot();
</script>
